---

- name: Testing Purging of Aliases
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'alias'

    oxlorg.opnsense.alias_multi:
      multi_control:
        fail_verify: true
        fail_process: true

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Purge ALL
      oxlorg.opnsense.alias_multi:
        multi_control:
          purge_all: true

    - name: Adding 1
      oxlorg.opnsense.alias_multi:
        multi:
          - name: 'ANSIBLE_TEST_4_1'
            content: ['192.168.1.1', '192.168.1.2']

          - name: 'ANSIBLE_TEST_4_2'
            type: 'network'
            content: '192.168.1.0/24'

          - name: 'ANSIBLE_TEST_4_3'
            type: 'port'
            content: [80, 443]
      when: not ansible_check_mode

    - name: Simple purge
      oxlorg.opnsense.alias_multi:
        multi_purge:
          - name: 'ANSIBLE_TEST_4_1'
      when: not ansible_check_mode
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Listing aliases
      oxlorg.opnsense.list:
      register: opn3
      failed_when: >
        'data' not in opn3 or
        opn3.data | length != 2
      when: not ansible_check_mode

    - name: Simple disable-purge
      oxlorg.opnsense.alias_multi:
        multi_purge:
          - name: 'ANSIBLE_TEST_4_2'
        multi_control:
          purge_action: 'disable'
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed
      when: not ansible_check_mode

    - name: Simple disable-purge - nothing changed
      oxlorg.opnsense.alias_multi:
        multi_purge:
          - name: 'ANSIBLE_TEST_4_2'
        multi_control:
          purge_action: 'disable'
      register: opn11
      when: not ansible_check_mode

    - name: Adding 2
      oxlorg.opnsense.alias_multi:
        multi:
          - name: 'ANSIBLE_TEST_4_1'
            content: ['192.168.1.1', '192.168.1.2']

          - name: 'ANSIBLE_TEST_4_2'
            type: 'network'
            content: '192.168.1.0/24'

          - name: 'ANSIBLE_TEST_4_3'
            type: 'port'
            content: [80, 443]
      when: not ansible_check_mode

    - name: Filtered purge (single)
      oxlorg.opnsense.alias_multi:
        multi_control:
          purge_filter:
            type: 'port'
      when: not ansible_check_mode
      register: opn4

    - name: Listing aliases
      oxlorg.opnsense.list:
      register: opn5
      failed_when: >
        'data' not in opn5 or
        opn5.data | length != 2
      when: not ansible_check_mode

    - name: Adding 3
      oxlorg.opnsense.alias_multi:
        multi:
          - name: 'ANSIBLE_TEST_4_1'
            content: ['192.168.1.1', '192.168.1.2']

          - name: 'ANSIBLE_TEST_4_2'
            type: 'network'
            content: '192.168.1.0/24'

          - name: 'ANSIBLE_TEST_4_3'
            type: 'port'
            content: [80, 443]
      when: not ansible_check_mode

    - name: Filtered purge (single inverted)
      oxlorg.opnsense.alias_multi:
        multi_control:
          purge_filter:
            type: 'port'
          purge_filter_invert: true
      when: not ansible_check_mode
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed

    - name: Listing aliases
      oxlorg.opnsense.list:
      register: opn7
      failed_when: >
        'data' not in opn7 or
        opn7.data | length != 1
      when: not ansible_check_mode

    - name: Adding 4
      oxlorg.opnsense.alias_multi:
        multi:
          - name: 'ANSIBLE_TEST_4_1'
            content: ['192.168.1.1', '192.168.1.2']

          - name: 'ANSIBLE_TEST_4_2'
            content: 'ANSIBLE_TEST_4_1'
      when: not ansible_check_mode

    - name: Purge used alias
      oxlorg.opnsense.alias_multi:
        multi_purge:
          - name: 'ANSIBLE_TEST_4_1'
        multi_control:
          fail_process: true  # default
      when: not ansible_check_mode
      register: opn11
      failed_when: >
        not opn11.failed or
        'currently referenced' not in opn11.msg

    - name: Purge ALL (except referenced by other)
      oxlorg.opnsense.alias_multi:
        multi_control:
          purge_all: true
      when: not ansible_check_mode
      register: opn9
      failed_when: >
        opn9.failed or
        not opn9.changed

    - name: Purge ALL (previously referenced)
      oxlorg.opnsense.alias_multi:
        multi_control:
          purge_all: true
      when: not ansible_check_mode
      register: opn12
      failed_when: >
        opn12.failed or
        not opn12.changed

    - name: Checking cleanup
      oxlorg.opnsense.list:
      register: opn10
      failed_when: >
        'data' not in opn10 or
        opn10.data | length != 0
      when: not ansible_check_mode
