---

- name: Testing Purging of Aliases
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/ansibleguy.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    ansibleguy.opnsense.list:
      target: 'alias'

  tasks:
    - name: Adding 1
      ansibleguy.opnsense.alias:
        multi:
          - name: 'ANSIBLE_TEST_4_1'
            content: ['192.168.1.1', '192.168.1.2']
          - name: 'ANSIBLE_TEST_4_2'
            type: 'network'
            content: '192.168.1.0/24'
          - name: 'ANSIBLE_TEST_4_3'
            type: 'port'
            content: [80, 443]
      when: not ansible_check_mode

    - name: Simple disable-purge
      ansibleguy.opnsense.alias:
        multi_purge:
          - name: 'ANSIBLE_TEST_4_2'
        multi_control:
          purge_action: 'disable'
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed
      when: not ansible_check_mode

    - name: Simple disable-purge - nothing changed
      ansibleguy.opnsense.alias:
        multi_purge:
          - name: 'ANSIBLE_TEST_4_2'
        multi_control:
          purge_action: 'disable'
      register: opn11
      when: not ansible_check_mode

    - name: Simple purge
      ansibleguy.opnsense.alias:
        multi_purge:
          - name: 'ANSIBLE_TEST_4_2'
      when: not ansible_check_mode
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Listing aliases
      ansibleguy.opnsense.list:
      register: opn3
      failed_when: >
        'data' not in opn3 or
        opn3.data | length != 2
      when: not ansible_check_mode

    - name: Adding 2
      ansibleguy.opnsense.alias:
        multi:
          - name: 'ANSIBLE_TEST_4_1'
            content: ['192.168.1.1', '192.168.1.2']
          - name: 'ANSIBLE_TEST_4_2'
            type: 'network'
            content: '192.168.1.0/24'
          - name: 'ANSIBLE_TEST_4_3'
            type: 'port'
            content: [80, 443]
      when: not ansible_check_mode

    - name: Filtered purge (single)
      ansibleguy.opnsense.alias:
        multi_control:
          purge_all: true
          purge_filter:
            type: 'port'
      when: not ansible_check_mode
      register: opn4

    - name: Listing aliases
      ansibleguy.opnsense.list:
      register: opn5
      failed_when: >
        'data' not in opn5 or
        opn5.data | length != 2
      when: not ansible_check_mode

    - name: Adding 3
      ansibleguy.opnsense.alias:
        multi:
          - name: 'ANSIBLE_TEST_4_1'
            content: ['192.168.1.1', '192.168.1.2']
          - name: 'ANSIBLE_TEST_4_2'
            type: 'network'
            content: '192.168.1.0/24'
          - name: 'ANSIBLE_TEST_4_3'
            type: 'port'
            content: [80, 443]
      when: not ansible_check_mode

    - name: Filtered purge (single inverted)
      ansibleguy.opnsense.alias:
        multi_control:
          purge_all: true
          purge_filter:
            type: 'port'
          purge_filter_invert: true
      when: not ansible_check_mode
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed

    - name: Listing aliases
      ansibleguy.opnsense.list:
      register: opn7
      failed_when: >
        'data' not in opn7 or
        opn7.data | length != 1
      when: not ansible_check_mode

    - name: Adding 4
      ansibleguy.opnsense.alias:
        multi:
          - name: 'ANSIBLE_TEST_4_1'
            content: ['192.168.1.1', '192.168.1.2']
          - name: 'ANSIBLE_TEST_4_2'
            content: 'ANSIBLE_TEST_4_1'
      when: not ansible_check_mode

    - name: Purge used alias
      ansibleguy.opnsense.alias:
        multi_purge:
          - name: 'ANSIBLE_TEST_4_2'
      when: not ansible_check_mode
      register: opn11
      failed_when: >
        opn11.failed or
        'warnings' not in opn11

    - name: Purge using alias first
      ansibleguy.opnsense.alias:
        multi_purge:
          - name: 'ANSIBLE_TEST_4_1'
      when: not ansible_check_mode

    - name: Purge ALL
      ansibleguy.opnsense.alias:
        multi_control:
          purge_all: true
      when: not ansible_check_mode
      register: opn9
      failed_when: >
        opn9.failed or
        not opn9.changed

    - name: Checking cleanup
      ansibleguy.opnsense.list:
      register: opn10
      failed_when: >
        'data' not in opn10 or
        opn10.data | length != 0
      when: not ansible_check_mode
