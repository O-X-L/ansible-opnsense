---

- name: Testing dnsmasq general
  hosts: localhost
  gather_facts: no
  module_defaults:
    ansibleguy.opnsense.dnsmasq_general:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false
      # match_fields: ['description']

  tasks:
#    - name: Listing
#      ansibleguy.opnsense.list:
#      register: opn_pre1
#      failed_when: >
#        'data' not in opn_pre1 or
#        opn_pre1.data | length != 0

    - name: enable and configure all dnsmasq options
      ansibleguy.opnsense.dnsmasq_general:
        enabled: 1
        interfaces: ['wan','opt1']
        regdhcp: True
        regdhcpstatic: 1
        domain_needed: 1
        dns_port: 54 # config-based.. not in memory.. probably needs a reboot of the service?
        dnssec: True
        no_hosts: true
        dhcpfirst: true
        strict_order: true
        strictbind: true
        no_private_reverse: true
        log_queries: true
        no_ident: false
        regdhcpdomain: 'test.domain'
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - ansible.builtin.pause:

    - name: change dnsmasq to different interface
      ansibleguy.opnsense.dnsmasq_general:
        enabled: 1
        interfaces: ['wan']
#        regdhcp: True
#        regdhcpstatic: 1
#        domain_needed: 1
#        dns_port: 54 # config-based.. not in memory.. probably needs a reboot of the service?
#        dnssec: True
#        no_hosts: true
#        dhcpfirst: true
#        strict_order: true
#        strictbind: true
#        no_private_reverse: true
#        log_queries: true
#        no_ident: false
#        regdhcpdomain: 'test.domain'
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - ansible.builtin.pause:

    - name: disable dnsmasq
      ansibleguy.opnsense.dnsmasq_general:
        enabled: false
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

