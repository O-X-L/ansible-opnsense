---

- name: Testing Alias - stati
  hosts: localhost
  gather_facts: no
  module_defaults:
    oxlorg.opnsense.alias:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Removing - does not exist
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_1'
        state: 'absent'
      register: opn1
      failed_when: opn1.changed

    - name: Failing because alias name is too long (>32 char)
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_1_TOOOOOOOOOOO_LONG'
        content: '1.1.1.1'
      register: opn13
      failed_when: not opn13.failed

    - name: Adding
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_1'
        content: '1.1.1.1'
      register: opn2
      failed_when: >
        not opn2.changed or
        opn2.failed

    - name: Nothing changed
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_1'
        content: '1.1.1.1'
      register: opn3
      failed_when: >
        opn3.changed or
        opn3.failed
      when: not ansible_check_mode

    - name: Changing
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_1'
        content: ['1.1.1.2', '1.1.1.3']
      register: opn4
      failed_when: >
        not opn4.changed or
        opn4.failed

    - name: Changing to other type - invalid
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_1'
        type: 'url'
        content: 'https://test.oxlorg.net'
      register: opn9
      failed_when: not opn9.failed
      when: not ansible_check_mode

    - name: Disabling
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_1'
        enabled: false
        content: ['1.1.1.2', '1.1.1.3']
      register: opn5
      failed_when: >
        not opn5.changed or
        opn5.failed
      when: not ansible_check_mode

    - name: Disabling - nothing changed
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_1'
        enabled: false
        content: ['1.1.1.2', '1.1.1.3']
      register: opn8
      failed_when: >
        opn8.changed or
        opn8.failed
      when: not ansible_check_mode

    - name: Enabling
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_1'
        content: ['1.1.1.2', '1.1.1.3']
      register: opn6
      failed_when: >
        not opn6.changed or
        opn6.failed
      when: not ansible_check_mode

    - name: Enabling - nothing changed
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_1'
        content: ['1.1.1.2', '1.1.1.3']
      register: opn7
      failed_when: >
        opn7.changed or
        opn7.failed
      when: not ansible_check_mode

    - name: Removing
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_1'
        state: 'absent'
      register: opn4
      failed_when: >
        not opn4.changed or
        opn4.failed
      when: not ansible_check_mode

- name: Testing Alias - types
  hosts: localhost
  gather_facts: no
  module_defaults:
    oxlorg.opnsense.alias:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    # hosts

    - name: Adding single host
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_HOST1'
        type: 'host'
        content: '1.1.1.1'

    - name: Adding multiple hosts
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_HOST2'
        type: 'host'
        content: ['1.1.1.1', '1.1.1.2']

    - name: Adding nested host
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_HOST3'
        type: 'host'
        content: ['ANSIBLE_TEST_1_2_HOST2', 'ANSIBLE_TEST_1_2_HOST1']
      register: opnhost2
      failed_when: opnhost2.failed != ansible_check_mode

    - name: Adding ip range
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_HOST4'
        type: 'host'
        content: '1.1.1.1-1.1.1.4'

    - name: Adding exclusion
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_HOST5'
        type: 'host'
        content: '!1.1.1.1'

    - name: Adding invalid host
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_HOST3'
        type: 'host'
        content: "{{ item }}"
      register: opnhost1
      failed_when: not opnhost1.failed
      loop:
        - ['1.1.1.n']

    # networks

    - name: Adding network
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_NET1'
        type: 'network'
        content: '192.168.0.0/24'

    - name: Adding multiple networks
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_NET2'
        type: 'network'
        content: ['192.168.0.0/24', '192.168.1.0/24']

    - name: Adding invalid network
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_NET3'
        type: 'network'
        content: "{{ item }}"
      register: opnnet1
      failed_when: not opnnet1.failed
      loop:
        - ['192.168.0.0/240']

    - name: Adding nested network
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_NET3'
        type: 'network'
        content: ['ANSIBLE_TEST_1_2_NET1', 'ANSIBLE_TEST_1_2_NET2']
      register: opnnet2
      failed_when: opnnet2.failed != ansible_check_mode

    # ports

    - name: Adding port
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_PORT1'
        type: 'port'
        content: 9000

    - name: Adding multiple ports
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_PORT2'
        type: 'port'
        content: ['80', 443]

    - name: Adding invalid port
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_PORT3'
        type: 'port'
        content: "{{ item }}"
      register: opnport1
      failed_when: not opnport1.failed
      loop:
        - ['70000']

    - name: Adding port range
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_PORT4'
        type: 'port'
        content: '9000:9500'

    - name: Adding nested ports
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_PORT5'
        type: 'port'
        content:
          - 'ANSIBLE_TEST_1_2_PORT1'
          - 'ANSIBLE_TEST_1_2_PORT2'
      register: opnport2
      failed_when: opnport2.failed != ansible_check_mode

    - name: Adding port service name
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_PORT6'
        type: 'port'
        content: 'smtp'

    # mac

    - name: Adding mac
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_MAC1'
        type: 'mac'
        content: f4:90:ea:00:00:01

    - name: Adding multiple macs
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_MAC2'
        type: 'mac'
        content: ['f4:90:ea:00:00:01', 'f4:90:ea:00:00:02']

    - name: Adding partial mac
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_MAC3'
        type: 'mac'
        content: f4:90:ea:00

    - name: Adding invalid mac
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_MAC4'
        type: 'mac'
        content: "{{ item }}"
      register: opnmac1
      failed_when: not opnmac1.failed
      loop:
        - ['aa:bb:cc:dd:ee:gg']
        - ['aa:bb:cc:dd:ee:fff']
        - ['aa:bb:cc:dd:ee:ff:ff']
        - ['aa:bb:cc:dd:ee:f']
        - ['aa:bb:cc:dd:ee:']
        - ['aa:']

    # urls

    - name: Adding url
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_URL1'
        type: 'url'
        content: 'https://oxlorg.net'

    - name: Adding multiple urls
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_URL2'
        type: 'url'
        content: ['https://template.oxlorg.net', 'http://test.oxlorg.net']

    - name: Adding invalid url
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_URL3'
        type: 'url'
        content: "{{ item }}"
      register: opnurl1
      failed_when: not opnurl1.failed
      loop:
        - ['httks://test.oxlorg.net']
        - ['test.oxlorg.net']

    # urltable

    - name: Adding urltable
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_URLTABLE1'
        type: 'urltable'
        updatefreq_days: 2
        content: 'https://www.spamhaus.org/drop/drop.txt'

    - name: Adding urltable - nothing changed
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_URLTABLE1'
        type: 'urltable'
        updatefreq_days: 2
        content: 'https://www.spamhaus.org/drop/drop.txt'
      register: opn14
      failed_when: >
        opn14.failed or
        opn14.changed
      when: not ansible_check_mode

    - name: Updating urltable update-frequency
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_URLTABLE1'
        type: 'urltable'
        updatefreq_days: 6.5
        content: 'https://www.spamhaus.org/drop/drop.txt'
      register: opn15
      failed_when: >
        opn15.failed or
        not opn15.changed
      when: not ansible_check_mode

    - name: Adding multiple urltables
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_URLTABLE2'
        type: 'urltable'
        content: ['https://www.spamhaus.org/drop/drop.txt']

    - name: Adding invalid urltable
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_URLTABLE3'
        type: 'urltable'
        content: "{{ item }}"
      register: opnurltable1
      failed_when: not opnurltable1.failed
      loop:
        - ['httks://test.oxlorg.net']
        #        - ['https://oxlorg.net']  # not an urltable

    # urljson

    - name: Adding urljson
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_URLJSON1'
        type: 'urltable'
        updatefreq_days: 2
        content: 'https://api.github.com/meta'
        path_expression: .web + .api + .git | .[]

    - name: Adding urljson - nothing changed
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_URLJSON1'
        type: 'urltable'
        updatefreq_days: 2
        content: 'https://api.github.com/meta'
        path_expression: .web + .api + .git | .[]
      register: opn16
      failed_when: >
        opn16.failed or
        opn16.changed
      when: not ansible_check_mode

    # geoip

    - name: Adding geoip
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_GEOIP1'
        type: 'geoip'
        content: 'AT'

    - name: Adding multiple geoips
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_GEOIP2'
        type: 'geoip'
        content: ['AT', 'DE', 'CH']

    - name: Adding invalid geoip
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_GEOIP3'
        type: 'geoip'
        content: "{{ item }}"
      register: opngeoip1
      failed_when: not opngeoip1.failed
      when: not ansible_check_mode  # no client-side validation
      loop:
        - ['XXX']

    # dynipv6host

    - name: Adding dynipv6host
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_2_DYNIPV6HOST1'
        type: 'dynipv6host'
        content:
          - '::1000'
          - '::f00d'
        interface: 'lan'

    # cleanup

    - name: Cleanup
      oxlorg.opnsense.alias:
        name: "{{ item }}"
        state: 'absent'
      diff: false
      loop:
        - 'ANSIBLE_TEST_1_2_URLJSON1'
        - 'ANSIBLE_TEST_1_2_URLTABLE3'
        - 'ANSIBLE_TEST_1_2_URLTABLE2'
        - 'ANSIBLE_TEST_1_2_URLTABLE1'
        - 'ANSIBLE_TEST_1_2_URL1'
        - 'ANSIBLE_TEST_1_2_URL2'
        - 'ANSIBLE_TEST_1_2_URL3'
        - 'ANSIBLE_TEST_1_2_PORT5'
        - 'ANSIBLE_TEST_1_2_PORT1'
        - 'ANSIBLE_TEST_1_2_PORT2'
        - 'ANSIBLE_TEST_1_2_PORT3'
        - 'ANSIBLE_TEST_1_2_PORT4'
        - 'ANSIBLE_TEST_1_2_PORT6'
        - 'ANSIBLE_TEST_1_2_MAC1'
        - 'ANSIBLE_TEST_1_2_MAC2'
        - 'ANSIBLE_TEST_1_2_MAC3'
        - 'ANSIBLE_TEST_1_2_MAC4'
        - 'ANSIBLE_TEST_1_2_NET3'
        - 'ANSIBLE_TEST_1_2_NET1'
        - 'ANSIBLE_TEST_1_2_NET2'
        - 'ANSIBLE_TEST_1_2_NET4'
        - 'ANSIBLE_TEST_1_2_HOST5'
        - 'ANSIBLE_TEST_1_2_HOST4'
        - 'ANSIBLE_TEST_1_2_HOST3'
        - 'ANSIBLE_TEST_1_2_HOST2'
        - 'ANSIBLE_TEST_1_2_HOST1'
        - 'ANSIBLE_TEST_1_2_GEOIP1'
        - 'ANSIBLE_TEST_1_2_GEOIP2'
        - 'ANSIBLE_TEST_1_2_GEOIP3'
        - 'ANSIBLE_TEST_1_2_DYNIPV6HOST1'

- name: Testing Alias - listing
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'alias'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing aliases (none)
      oxlorg.opnsense.list:
      register: opn10
      failed_when: >
        'data' not in opn10 or
        opn10.data | length != 0

    - name: Adding dummy alias
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_3_1'
        content: 'test.oxlorg.net'
      when: not ansible_check_mode

    - name: Listing aliases
      oxlorg.opnsense.list:
      register: opn11
      failed_when: >
        'data' not in opn11 or
        opn11.data | length != 1
      when: not ansible_check_mode

    - name: Adding dummy alias 2
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_1_3_2'
        content: 'template.oxlorg.net'
      when: not ansible_check_mode

    - name: Listing aliases
      oxlorg.opnsense.list:
      register: opn12
      failed_when: >
        'data' not in opn12 or
        opn12.data | length != 2
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.alias:
        name: "{{ item }}"
        state: 'absent'
      diff: false
      loop:
        - 'ANSIBLE_TEST_1_3_1'
        - 'ANSIBLE_TEST_1_3_2'
