---

- name: Testing Reload
  hosts: localhost
  gather_facts: no
  module_defaults:
    oxlorg.opnsense.reload:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_CREDS_FILE') }}"
      ssl_verify: false

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Reloading
      oxlorg.opnsense.reload:
        target: "{{ item }}"
        timeout: 90
      when: not ansible_check_mode
      loop:
        - 'alias'
        - 'rule'
        - 'route'
        - 'gateway'  # issue 88
        - 'cron'  # issue 88
        # - 'unbound'  taking way too long for testing (90+ sec)
        - 'syslog'
        - 'ipsec'
        - 'ipsec_legacy'
        - 'shaper'
        - 'monit'
        - 'wireguard'
        - 'interface_vlan'
        - 'interface_vxlan'
        - 'interface_vip'
        - 'interface_lagg'
        - 'frr'
        - 'webproxy'
        - 'bind'
        - 'ids'
        - 'openvpn'
        - 'dhcrelay'
        - 'dhcp'
        - 'dnsmasq'
        - 'haproxy'
        - 'wazuh'
        - 'nat_source'
        - 'nat_one_to_one'
        - 'nut'
