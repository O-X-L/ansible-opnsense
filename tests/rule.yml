---

- name: Testing Rules - basics
  hosts: localhost
  gather_facts: no
  module_defaults:
    oxlorg.opnsense.rule:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false
      match_fields: ['description']

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Deleting - does not exist
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        destination_net: '192.168.1.0/24'
        destination_port: 443
        protocol: 'TCP'
        state: 'absent'
        description: 'ANSIBLE_TEST_1_1'
      register: opn1
      failed_when: >
        opn1.failed or
        opn1.changed

    - name: Creating
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        destination_net: '192.168.1.0/24'
        destination_port: 443
        protocol: 'TCP'
        description: 'ANSIBLE_TEST_1_1'

    - name: Updating - nothing changed
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        destination_net: '192.168.1.0/24'
        destination_port: 443
        protocol: 'TCP'
        description: 'ANSIBLE_TEST_1_1'
      register: opn2
      failed_when: >
        opn2.failed or
        opn2.changed
      when: not ansible_check_mode

    - name: Updating
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        destination_net: '192.168.2.0/24'
        destination_port: 443
        protocol: 'TCP'
        description: 'ANSIBLE_TEST_1_1'
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed
      when: not ansible_check_mode

    - name: Updating more
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        destination_net: '192.168.2.0/24'
        destination_port: 8443
        protocol: 'UDP'
        description: 'ANSIBLE_TEST_1_1'
        interface: ['lan']  #  note: 'lo0' not accepted :(
        log: false
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed
      when: not ansible_check_mode

    - name: Disabling
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        destination_net: '192.168.2.0/24'
        destination_port: 8443
        protocol: 'UDP'
        description: 'ANSIBLE_TEST_1_1'
        interface: ['lan']  #  note: 'lo0' not accepted :(
        log: false
        enabled: false
      register: opn69
      failed_when: >
        opn69.failed or
        not opn69.changed
      when: not ansible_check_mode

    - name: Disabling - nothing changed
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        destination_net: '192.168.2.0/24'
        destination_port: 8443
        protocol: 'UDP'
        description: 'ANSIBLE_TEST_1_1'
        interface: ['lan']  #  note: 'lo0' not accepted :(
        log: false
        enabled: false
      register: opn70
      failed_when: >
        opn70.failed or
        opn70.changed
      when: not ansible_check_mode

    - name: Enabling
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        destination_net: '192.168.2.0/24'
        destination_port: 8443
        protocol: 'UDP'
        description: 'ANSIBLE_TEST_1_1'
        interface: ['lan']  #  note: 'lo0' not accepted :(
        log: false
        enabled: true
      register: opn71
      failed_when: >
        opn71.failed or
        not opn71.changed
      when: not ansible_check_mode

    - name: Creating IPv6
      oxlorg.opnsense.rule:
        destination_port: 443
        protocol: 'TCP'
        description: 'ANSIBLE_TEST_1_10'
        ip_protocol: 'inet6'
      register: opn17
      failed_when: >
        opn17.failed or
        not opn17.changed

    - name: Updating IPv4
      oxlorg.opnsense.rule:
        destination_port: 443
        protocol: 'TCP'
        description: 'ANSIBLE_TEST_1_10'
      register: opn18
      failed_when: >
        opn18.failed or
        not opn18.changed
      when: not ansible_check_mode

    - name: Triggering server-side validation error for interfaces
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        destination_net: '192.168.2.0/24'
        destination_port: 443
        protocol: 'TCP'
        description: 'ANSIBLE_TEST_1_11'
        interface: ['lan', 'does_not_exist']
      register: opn19
      failed_when: not opn19.failed
      when: not ansible_check_mode

    - name: Triggering server-side validation error for ports
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        destination_net: '192.168.2.0/24'
        destination_port: 'XYZ'
        protocol: 'TCP'
        description: 'ANSIBLE_TEST_1_11'
      register: opn20
      failed_when: not opn20.failed
      when: not ansible_check_mode

    - name: Creating block rule
      oxlorg.opnsense.rule:
        source_net: '192.168.1.0/24'
        destination_invert: true
        destination_net: '10.0.0.0/8'
        description: 'ANSIBLE_TEST_1_2'
        action: 'block'

    - name: Test port-range
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        destination_net: '192.168.2.0/24'
        destination_port: '50000-51000'
        protocol: 'TCP'
        description: 'ANSIBLE_TEST_1_12'

    - name: Test self (this firewall)
      oxlorg.opnsense.rule:
        destination_net: '(self)'
        destination_port: 69
        protocol: 'UDP'
        description: 'ANSIBLE_TEST_1_13'
      register: opn21
      failed_when: >
        opn21.failed or
        not opn21.changed

    - name: Test TCP/UDP inet46
      oxlorg.opnsense.rule:
        destination_port: 69
        ip_protocol: 'inet46'
        protocol: 'TCP/UDP'
        description: 'ANSIBLE_TEST_1_14'
      register: opn22
      failed_when: >
        opn22.failed or
        not opn22.changed

    - name: Test ICMP-type
      oxlorg.opnsense.rule:
        ip_protocol: 'inet46'
        protocol: 'ICMP'
        icmp_type: ['echoreq', 'echorep']
        description: 'ANSIBLE_TEST_1_15'
      register: opn23
      failed_when: >
        opn23.failed or
        not opn23.changed

    - name: Test ICMP-type - Nothing changed
      oxlorg.opnsense.rule:
        ip_protocol: 'inet46'
        protocol: 'ICMP'
        icmp_type: ['echoreq', 'echorep']
        description: 'ANSIBLE_TEST_1_15'
      register: opn24
      failed_when: >
        opn24.failed or
        opn24.changed
      when: not ansible_check_mode

    - name: Test direction any
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        destination_net: '192.168.2.0/24'
        destination_port: 443
        protocol: 'TCP'
        direction: 'any'
        description: 'ANSIBLE_TEST_1_16'
      register: opn25
      failed_when: >
        opn25.failed or
        not opn25.changed

    - name: Test direction any - Nothing changed
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        destination_net: '192.168.2.0/24'
        destination_port: 443
        protocol: 'TCP'
        direction: 'any'
        description: 'ANSIBLE_TEST_1_16'
      register: opn26
      failed_when: >
        opn26.failed or
        opn26.changed
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.rule:
        description: "{{ item }}"
        state: 'absent'
      diff: false
      loop:
        - 'ANSIBLE_TEST_1_1'
        - 'ANSIBLE_TEST_1_2'
        - 'ANSIBLE_TEST_1_10'
        - 'ANSIBLE_TEST_1_11'
        - 'ANSIBLE_TEST_1_12'
        - 'ANSIBLE_TEST_1_13'
        - 'ANSIBLE_TEST_1_14'
        - 'ANSIBLE_TEST_1_15'
        - 'ANSIBLE_TEST_1_16'

- name: Testing Rules - aliases
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.rule:
      match_fields: ['description']

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Adding alias
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_3_1'
        type: 'urltable'
        content: 'https://www.spamhaus.org/drop/drop.txt'

    - name: Adding port alias
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_3_2'
        type: 'port'
        content: 80

    - name: Adding rule using alias-destination
      oxlorg.opnsense.rule:
        destination_invert: true
        destination_net: 'ANSIBLE_TEST_3_1'
        description: 'ANSIBLE_TEST_1_3'
        action: 'block'

    - name: Adding rule using alias-port
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        destination_net: '192.168.1.0/24'
        destination_port: 'ANSIBLE_TEST_3_2'
        protocol: 'TCP'
        description: 'ANSIBLE_TEST_1_4'

    - name: Cleanup rules
      oxlorg.opnsense.rule:
        description: "{{ item }}"
        state: 'absent'
      diff: false
      loop:
        - 'ANSIBLE_TEST_1_3'
        - 'ANSIBLE_TEST_1_4'

    - name: Cleanup aliases
      oxlorg.opnsense.alias:
        name: "{{ item }}"
        state: 'absent'
      diff: false
      loop:
        - 'ANSIBLE_TEST_3_1'
        - 'ANSIBLE_TEST_3_2'

- name: Testing Rules - listing
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'rule'

    oxlorg.opnsense.rule:
      match_fields: ['description']

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing rules (none)
      oxlorg.opnsense.list:
      register: opn7
      failed_when: >
        'data' not in opn7 or
        opn7.data | length != 0

    - name: Creating dummy rule
      oxlorg.opnsense.rule:
        source_net: '192.168.1.0/24'
        destination_invert: true
        destination_net: '10.0.0.0/8'
        description: 'ANSIBLE_TEST_1_5'
        action: 'block'
      when: not ansible_check_mode

    - name: Listing rules
      oxlorg.opnsense.list:
      register: opn8
      failed_when: >
        'data' not in opn8 or
        opn8.data | length != 1
      when: not ansible_check_mode

    - name: Modifying dummy rule 1 by uuid
      oxlorg.opnsense.rule:
        source_net: '192.168.1.0/24'
        destination_invert: true
        destination_net: '10.1.0.0/8'
        description: 'ANSIBLE_TEST_1_5'
        action: 'block'
        match_fields: ['uuid']
        uuid: "{{ opn8.data[0]['uuid'] }}"
      when: not ansible_check_mode

    - name: Creating dummy rule 2
      oxlorg.opnsense.rule:
        source_net: '192.168.1.0/24'
        destination_invert: true
        destination_net: '10.0.0.0/8'
        description: 'ANSIBLE_TEST_1_8'
        enabled: false
        action: 'block'
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.rule:
        description: "{{ item }}"
        state: 'absent'
      diff: false
      loop:
        - 'ANSIBLE_TEST_1_5'
        - 'ANSIBLE_TEST_1_8'

    - name: Checking cleanup
      oxlorg.opnsense.list:
      register: opn14
      failed_when: >
        'data' not in opn14 or
        opn14.data | length != 0

- name: Testing Rules - matching
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'rule'

    oxlorg.opnsense.rule:
      match_fields: ['source_net', 'description']

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing rules - before
      oxlorg.opnsense.list:
      register: opn10
      failed_when: >
        'data' not in opn10 or
        opn10.data | length != 0
      when: not ansible_check_mode

    - name: Creating rule 1
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        description: 'ANSIBLE_TEST_1_6'

        destination_net: '192.168.1.0/24'
        destination_port: 443
        protocol: 'TCP'

    - name: Modifying rule 1
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        description: 'ANSIBLE_TEST_1_6'

        destination_net: '192.168.10.0/24'
        destination_port: 443
        protocol: 'TCP'
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed
      when: not ansible_check_mode

    - name: Creating rule 2
      oxlorg.opnsense.rule:
        source_net: '192.168.0.0/24'
        description: 'ANSIBLE_TEST_1_7'

        destination_net: '192.168.1.0/24'
        destination_port: 443
        protocol: 'TCP'

    - name: Creating rule 3
      oxlorg.opnsense.rule:
        source_net: '192.168.1.0/24'
        description: 'ANSIBLE_TEST_1_7'

        destination_net: '192.168.1.0/24'
        destination_port: 443
        protocol: 'TCP'

    - name: Modifying rule 3
      oxlorg.opnsense.rule:
        source_net: '192.168.1.0/24'
        description: 'ANSIBLE_TEST_1_7'

        destination_net: '192.168.1.0/24'
        destination_port: 443
        protocol: 'UDP'
      when: not ansible_check_mode

    - name: Listing rules - after
      oxlorg.opnsense.list:
      register: opn11
      failed_when: >
        'data' not in opn11 or
        opn11.data | length != 3
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.rule:
        description: "{{ item }}"
        state: 'absent'
        match_fields: ['description']
      diff: false
      loop:
        - 'ANSIBLE_TEST_1_6'
        - 'ANSIBLE_TEST_1_7'
        - 'ANSIBLE_TEST_1_7'

    - name: Checking cleanup
      oxlorg.opnsense.list:
      register: opn15
      failed_when: >
        'data' not in opn15 or
        opn15.data | length != 0

- name: Testing Rules - alias deletion if in use
  # this is to fix lacking server-side checks for the automation-rules
  # see: https://forum.opnsense.org/index.php?topic=30077.msg145259#msg145259
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.rule:
      match_fields: ['description']

    oxlorg.opnsense.list:
      target: 'rule'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Creating alias
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_3_3'
        content: '192.168.0.1'
      when: not ansible_check_mode

    - name: Creating rule
      oxlorg.opnsense.rule:
        source_net: 'ANSIBLE_TEST_3_3'
        description: 'ANSIBLE_TEST_1_9'
        protocol: 'TCP'
      when: not ansible_check_mode

    - name: Deleting alias - should fail
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_3_3'
        state: 'absent'
      register: opn13
      failed_when: not opn13.failed
      when: not ansible_check_mode

    - name: Cleanup rule
      oxlorg.opnsense.rule:
        description: 'ANSIBLE_TEST_1_9'
        state: 'absent'
      diff: false
      when: not ansible_check_mode

    - name: Cleanup alias
      oxlorg.opnsense.alias:
        name: 'ANSIBLE_TEST_3_3'
        state: 'absent'
      diff: false
      when: not ansible_check_mode

    - name: Checking cleanup
      oxlorg.opnsense.list:
      register: opn16
      failed_when: >
        'data' not in opn16 or
        opn16.data | length != 0

- name: Testing Rules - Advanced Mode
  hosts: localhost
  gather_facts: no
  module_defaults:
    oxlorg.opnsense.rule:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false
      match_fields: ['description']

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Adding 1 - failing because of invalid value
      oxlorg.opnsense.rule:
        tcp_flags: syn
        description: 'ANSIBLE_TEST_4_1'
      register: opn_fail1
      failed_when: not opn_fail1.failed
      ignore_errors: true

    - name: Adding Filter
      oxlorg.opnsense.rule:
        protocol: TCP
        allow_opts: true
        tcp_flags: syn
        tcp_flags_clear: ack
        description: 'ANSIBLE_TEST_4_1'

    - name: Updating Filter - nothing changed
      oxlorg.opnsense.rule:
        protocol: TCP
        allow_opts: true
        tcp_flags: syn
        tcp_flags_clear: ack
        description: 'ANSIBLE_TEST_4_1'
      register: opn1
      failed_when: >
        opn1.failed or
        opn1.changed
      when: not ansible_check_mode

    - name: Updating Stateful firewall
      oxlorg.opnsense.rule:
        protocol: TCP
        state_type: sloppy
        state_policy: floating
        state_timeout: 42
        max_src_nodes: 43
        max_src_states: 44
        max_src_conn: 45
        max_src_conn_rate: 46
        max_src_conn_rates: 47
        overload: virusprot
        adaptive_start: 48
        adaptive_end: 99
        description: 'ANSIBLE_TEST_4_1'
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Updating Stateful firewall - nothing changed
      oxlorg.opnsense.rule:
        protocol: TCP
        state_type: sloppy
        state_policy: floating
        state_timeout: 42
        max_src_nodes: 43
        max_src_states: 44
        max_src_conn: 45
        max_src_conn_rate: 46
        max_src_conn_rates: 47
        overload: virusprot
        adaptive_start: 48
        adaptive_end: 99
        description: 'ANSIBLE_TEST_4_1'
      register: opn3
      failed_when: >
        opn3.failed or
        opn3.changed
      when: not ansible_check_mode

    - name: Updating Source Routing firewall
      oxlorg.opnsense.rule:
        gateway: TEST-GW
        replyto: TEST-GW
        disable_replyto: true
        description: 'ANSIBLE_TEST_4_1'
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed

    - name: Updating Source Routing - nothing changed
      oxlorg.opnsense.rule:
        gateway: TEST-GW
        replyto: TEST-GW
        disable_replyto: true
        description: 'ANSIBLE_TEST_4_1'
      register: opn5
      failed_when: >
        opn5.failed or
        opn5.changed
      when: not ansible_check_mode

    - name: Updating Internal tagging
      oxlorg.opnsense.rule:
        tagged: ansible
        tag: ansible
        description: 'ANSIBLE_TEST_4_1'
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed

    - name: Updating Internal tagging - nothing changed
      oxlorg.opnsense.rule:
        tagged: ansible
        tag: ansible
        description: 'ANSIBLE_TEST_4_1'
      register: opn7
      failed_when: >
        opn7.failed or
        opn7.changed
      when: not ansible_check_mode

    - name: Updating Priority
      oxlorg.opnsense.rule:
        prio: 1
        set_prio: 2
        set_prio_low: 3
        tos: af42
        description: 'ANSIBLE_TEST_4_1'
      register: opn8
      failed_when: >
        opn8.failed or
        not opn8.changed

    - name: Updating Priority - nothing changed
      oxlorg.opnsense.rule:
        prio: 1
        set_prio: 2
        set_prio_low: 3
        tos: af42
        description: 'ANSIBLE_TEST_4_1'
      register: opn9
      failed_when: >
        opn9.failed or
        opn9.changed
      when: not ansible_check_mode

    - name: Updating Internal tagging
      oxlorg.opnsense.rule:
        tagged: ansible
        tag: ansible
        description: 'ANSIBLE_TEST_4_1'
      register: opn10
      failed_when: >
        opn10.failed or
        not opn10.changed

    - name: Updating Internal tagging - nothing changed
      oxlorg.opnsense.rule:
        tagged: ansible
        tag: ansible
        description: 'ANSIBLE_TEST_4_1'
      register: opn11
      failed_when: >
        opn11.failed or
        opn11.changed
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.rule:
        description: "{{ item }}"
        state: 'absent'
      diff: false
      loop:
        - 'ANSIBLE_TEST_4_1'
