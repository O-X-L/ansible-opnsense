---

- name: Testing HAProxy FCGI application management
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_CREDS_FILE') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'haproxy_fcgi'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        opn_pre1.failed or
        'data' not in opn_pre1

    - name: Configuring - failing because of invalid name
      oxlorg.opnsense.haproxy_fcgi:
        name: ''
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Configuring - failing because of missing docroot
      oxlorg.opnsense.haproxy_fcgi:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Test FCGI app 1'
      register: opn_fail2
      failed_when: not opn_fail2.failed
      when: not ansible_check_mode

    # Create prerequisite actions for testing
    - name: Create test action for FCGI testing
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_FCGI_ACTION_1'
        description: 'Test Action for FCGI pass header'
        test_type: 'if'
        type: 'fcgi_pass_header'
        fcgi_pass_header: 'X-FCGI-Test'
      register: test_action1
      when: not ansible_check_mode

    - name: Create another test action for FCGI testing
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_FCGI_ACTION_2'
        description: 'Test Action for FCGI set param'
        test_type: 'if'
        type: 'fcgi_set_param'
        fcgi_set_param: 'SCRIPT_NAME=/app'
      register: test_action2
      when: not ansible_check_mode

    - name: Creating HAProxy FCGI application basic
      oxlorg.opnsense.haproxy_fcgi:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Test PHP-FPM application'
        enabled: true
        docroot: '/var/www/html'
        index: 'index.php'
        path_info: '^(/.+\.php)(/.*)?$'
        log_stderr: false
        keep_conn: true
        get_values: false
        mpxs_conns: false
        max_reqs: 100
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Creating HAProxy FCGI application with stderr logging
      oxlorg.opnsense.haproxy_fcgi:
        name: 'ANSIBLE_TEST_1_2'
        description: 'Test PHP-FPM application with logging'
        enabled: true
        docroot: '/var/www/api'
        index: 'api.php'
        path_info: '^(/.+\.php)(/.*)?$'
        log_stderr: true
        keep_conn: false
        get_values: true
        mpxs_conns: true
        max_reqs: 50
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Creating HAProxy FCGI application with actions
      oxlorg.opnsense.haproxy_fcgi:
        name: 'ANSIBLE_TEST_1_3'
        description: 'Test PHP-FPM application with actions'
        enabled: true
        docroot: '/var/www/app'
        index: 'app.php'
        linked_actions: ['ANSIBLE_TEST_FCGI_ACTION_1', 'ANSIBLE_TEST_FCGI_ACTION_2']
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed
      when: not ansible_check_mode

    - name: Creating HAProxy FCGI application minimal
      oxlorg.opnsense.haproxy_fcgi:
        name: 'ANSIBLE_TEST_1_4'
        description: 'Test minimal FCGI application'
        enabled: true
        docroot: '/var/www/simple'
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed

    - name: Changing FCGI application settings
      oxlorg.opnsense.haproxy_fcgi:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Modified test PHP-FPM application'
        enabled: true
        docroot: '/var/www/html/public'
        index: 'index.php'
        path_info: '^(/.+\.php)(/.*)?$'
        log_stderr: true
        keep_conn: true
        get_values: true
        mpxs_conns: false
        max_reqs: 200
      register: opn9
      failed_when: >
        opn9.failed or
        not opn9.changed
      when: not ansible_check_mode

    - name: Disabling HAProxy FCGI application
      oxlorg.opnsense.haproxy_fcgi:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Modified test PHP-FPM application'
        enabled: false
        docroot: '/var/www/html/public'
        index: 'index.php'
        path_info: '^(/.+\.php)(/.*)?$'
        log_stderr: true
        keep_conn: true
        get_values: true
        mpxs_conns: false
        max_reqs: 200
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Disabling HAProxy FCGI application - nothing changed
      oxlorg.opnsense.haproxy_fcgi:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Modified test PHP-FPM application'
        enabled: false
        docroot: '/var/www/html/public'
        index: 'index.php'
        path_info: '^(/.+\.php)(/.*)?$'
        log_stderr: true
        keep_conn: true
        get_values: true
        mpxs_conns: false
        max_reqs: 200
      register: opn6
      failed_when: >
        opn6.failed or
        opn6.changed
      when: not ansible_check_mode

    - name: Enabling HAProxy FCGI application
      oxlorg.opnsense.haproxy_fcgi:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Modified test PHP-FPM application'
        enabled: true
        docroot: '/var/www/html/public'
        index: 'index.php'
        path_info: '^(/.+\.php)(/.*)?$'
        log_stderr: true
        keep_conn: true
        get_values: true
        mpxs_conns: false
        max_reqs: 200
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed
      when: not ansible_check_mode

    - name: Nothing changed
      oxlorg.opnsense.haproxy_fcgi:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Modified test PHP-FPM application'
        enabled: true
        docroot: '/var/www/html/public'
        index: 'index.php'
        path_info: '^(/.+\.php)(/.*)?$'
        log_stderr: true
        keep_conn: true
        get_values: true
        mpxs_conns: false
        max_reqs: 200
      register: opn8
      failed_when: >
        opn8.failed or
        opn8.changed
      when: not ansible_check_mode

    - name: Cleanup FCGI app 1
      oxlorg.opnsense.haproxy_fcgi:
        name: "{{ item }}"
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_1_1'
        - 'ANSIBLE_TEST_1_2'
        - 'ANSIBLE_TEST_1_3'
        - 'ANSIBLE_TEST_1_4'
      when: not ansible_check_mode

    - name: Cleanup test action 1
      oxlorg.opnsense.haproxy_action:
        name: "{{ item }}"
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_FCGI_ACTION_1'
        - 'ANSIBLE_TEST_FCGI_ACTION_2'
      when: not ansible_check_mode
