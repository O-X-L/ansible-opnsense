---

- name: Testing HAProxy general logging settings
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/ansibleguy.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    ansibleguy.opnsense.list:
      target: 'haproxy_general_logging'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_pre1
      failed_when: >
        opn_pre1.failed or
        'data' not in opn_pre1

    - name: Configuring - failing because of invalid length
      ansibleguy.opnsense.haproxy_general_logging:
        length: 32
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Configuring - failing because of invalid facility
      ansibleguy.opnsense.haproxy_general_logging:
        facility: 'invalid_facility'
      register: opn_fail2
      failed_when: not opn_fail2.failed

    - name: Configuring basic logging settings
      ansibleguy.opnsense.haproxy_general_logging:
        enabled: true
        host: '192.168.1.100'
        facility: 'local1'
        level: 'warning'
        length: 1024
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing logging settings
      ansibleguy.opnsense.haproxy_general_logging:
        enabled: true
        host: '192.168.1.200:514'
        facility: 'local2'
        level: 'err'
        length: 2048
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Disabling logging
      ansibleguy.opnsense.haproxy_general_logging:
        enabled: false
        host: '192.168.1.200:514'
        facility: 'local2'
        level: 'err'
        length: 2048
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed
      when: not ansible_check_mode

    - name: Nothing changed
      ansibleguy.opnsense.haproxy_general_logging:
        enabled: false
        host: '192.168.1.200:514'
        facility: 'local2'
        level: 'err'
        length: 2048
      register: opn4
      failed_when: >
        opn4.failed or
        opn4.changed
      when: not ansible_check_mode

    - name: Testing default values
      ansibleguy.opnsense.haproxy_general_logging:
        enabled: true
        host: '127.0.0.1'
        facility: 'local0'
        level: 'info'
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Cleanup
      ansibleguy.opnsense.haproxy_general_logging:
        enabled: false
        host: '127.0.0.1'
        facility: 'local0'
        level: 'info'
      when: not ansible_check_mode