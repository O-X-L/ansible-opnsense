---

- name: Testing OpenVPN Status
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Querying OpenVPN Sessions
      oxlorg.opnsense.openvpn_status:
        target: 'sessions'
      register: opn1
      failed_when: "'data' not in opn1"

    - name: Querying OpenVPN Routes
      oxlorg.opnsense.openvpn_status:
        target: 'routes'
      register: opn2
      failed_when: "'data' not in opn2"
