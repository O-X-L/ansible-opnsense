---

- name: Testing HAProxy Action management
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'haproxy_action'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        opn_pre1.failed or
        'data' not in opn_pre1

    - name: Configuring - failing because of invalid name
      oxlorg.opnsense.haproxy_action:
        name: ''
      register: opn_fail1
      failed_when: not opn_fail1.failed
      when: not ansible_check_mode

    - name: Configuring - failing because of missing type
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Test Action 1'
      register: opn_fail2
      failed_when: not opn_fail2.failed
      when: not ansible_check_mode

    # Create prerequisites for testing
    - name: Create test ACL for Action testing
      oxlorg.opnsense.haproxy_acl:
        name: 'ANSIBLE_TEST_ACL_1'
        description: 'Test ACL for Action'
        expression: 'hdr'
        hdr: 'test.example.com'
      register: test_acl
      when: not ansible_check_mode

    - name: Create test Map file for Action testing
      oxlorg.opnsense.haproxy_mapfile:
        name: 'ANSIBLE_TEST_MAP_1'
        description: 'Test Map file for Action'
        content: |
          www.example.com backend_web
          api.example.com backend_api
          default backend_default
      register: test_mapfile
      when: not ansible_check_mode

    - name: Creating HAProxy Action with deny
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Test Action for deny'
        test_type: 'if'
        type: 'http-request_deny'
        operator: 'and'
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Creating HAProxy Action with ACL link
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_1_2'
        description: 'Test Action with ACL'
        test_type: 'if'
        linked_acls: ['ANSIBLE_TEST_ACL_1']
        operator: 'and'
        type: 'http-request_allow'
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed
      when: not ansible_check_mode

    - name: Creating HAProxy Action with header manipulation
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_1_3'
        description: 'Test Action for header add'
        test_type: 'if'
        type: 'http-request_add-header'
        http_request_add_header_name: 'X-Custom-Header'
        http_request_add_header_content: 'TestValue123'
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed

    - name: Creating HAProxy Action with variable setting
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_1_4'
        description: 'Test Action for set variable'
        test_type: 'if'
        type: 'http-request_set-var'
        http_request_set_var_scope: 'txn'
        http_request_set_var_name: 'test_var'
        http_request_set_var_expr: 'str(authenticated)'
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed

    - name: Creating HAProxy Action with map file
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_1_5'
        description: 'Test Action with Map file'
        test_type: 'if'
        type: 'use_backend'
        map_use_backend_file: 'ANSIBLE_TEST_MAP_1'
      register: opn_map
      failed_when: >
        opn_map.failed or
        not opn_map.changed
      when: not ansible_check_mode

    - name: Changing Action settings
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Modified test Action for deny'
        test_type: 'unless'
        type: 'http-request_deny'
        operator: 'or'
      register: opn9
      failed_when: >
        opn9.failed or
        not opn9.changed
      when: not ansible_check_mode

    - name: Changing Action operator
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Modified test Action for deny'
        test_type: 'if'
        type: 'http-request_deny'
        operator: 'and'
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Changing Action operator - nothing changed
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Modified test Action for deny'
        test_type: 'if'
        type: 'http-request_deny'
        operator: 'and'
      register: opn6
      failed_when: >
        opn6.failed or
        opn6.changed
      when: not ansible_check_mode

    - name: Changing Action back to original
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Test Action for deny'
        test_type: 'if'
        type: 'http-request_deny'
        operator: 'and'
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed
      when: not ansible_check_mode

    - name: Nothing changed
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Test Action for deny'
        test_type: 'if'
        type: 'http-request_deny'
        operator: 'and'
      register: opn8
      failed_when: >
        opn8.failed or
        opn8.changed
      when: not ansible_check_mode

    - name: Cleanup Action 1
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_1_1'
        state: 'absent'
      when: not ansible_check_mode

    - name: Cleanup Action 2
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_1_2'
        state: 'absent'
      when: not ansible_check_mode

    - name: Cleanup Action 3
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_1_3'
        state: 'absent'
      when: not ansible_check_mode

    - name: Cleanup Action 4
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_1_4'
        state: 'absent'
      when: not ansible_check_mode

    - name: Cleanup Action 5
      oxlorg.opnsense.haproxy_action:
        name: 'ANSIBLE_TEST_1_5'
        state: 'absent'
      when: not ansible_check_mode

    - name: Cleanup test ACL
      oxlorg.opnsense.haproxy_acl:
        name: 'ANSIBLE_TEST_ACL_1'
        expression: 'path_beg'
        state: 'absent'
      when: not ansible_check_mode

    - name: Cleanup test Map file
      oxlorg.opnsense.haproxy_mapfile:
        name: 'ANSIBLE_TEST_MAP_1'
        state: 'absent'
      when: not ansible_check_mode
