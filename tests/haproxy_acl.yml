---

- name: Testing HAProxy ACL management
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'haproxy_acl'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        opn_pre1.failed or
        'data' not in opn_pre1

    - name: Configuring - failing because of invalid name
      oxlorg.opnsense.haproxy_acl:
        name: ''
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Configuring - failing because of missing expression
      oxlorg.opnsense.haproxy_acl:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Test ACL 1'
      register: opn_fail2
      failed_when: not opn_fail2.failed

    - name: Creating HAProxy ACL with host matching
      oxlorg.opnsense.haproxy_acl:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Test ACL for host matching'
        expression: 'hdr'
        hdr: 'example.com'
        negate: false
        case_sensitive: false
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Creating HAProxy ACL with path matching
      oxlorg.opnsense.haproxy_acl:
        name: 'ANSIBLE_TEST_1_2'
        description: 'Test ACL for path matching'
        expression: 'path_beg'
        path_beg: '/api'
        negate: false
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Creating HAProxy ACL with source metrics
      oxlorg.opnsense.haproxy_acl:
        name: 'ANSIBLE_TEST_1_3'
        description: 'Test ACL for connection rate limit'
        expression: 'src_conn_rate'
        src_conn_rate: 100
        src_conn_rate_comparison: 'gt'
        negate: false
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed

    - name: Creating HAProxy ACL with custom header
      oxlorg.opnsense.haproxy_acl:
        name: 'ANSIBLE_TEST_1_4'
        description: 'Test ACL for custom header'
        expression: 'cust_hdr'
        cust_hdr_name: 'X-API-Key'
        cust_hdr: 'secret123'
        case_sensitive: true
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed

    - name: Changing ACL settings
      oxlorg.opnsense.haproxy_acl:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Modified test ACL for host matching'
        expression: 'hdr'
        hdr: 'modified.example.com'
        negate: false
        case_sensitive: true
      register: opn9
      failed_when: >
        opn9.failed or
        not opn9.changed

    - name: Disabling HAProxy ACL
      oxlorg.opnsense.haproxy_acl:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Modified test ACL for host matching'
        expression: 'hdr'
        hdr: 'modified.example.com'
        negate: true
        case_sensitive: true
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Disabling HAProxy ACL - nothing changed
      oxlorg.opnsense.haproxy_acl:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Modified test ACL for host matching'
        expression: 'hdr'
        hdr: 'modified.example.com'
        negate: true
        case_sensitive: true
      register: opn6
      failed_when: >
        opn6.failed or
        opn6.changed
      when: not ansible_check_mode

    - name: Enabling HAProxy ACL
      oxlorg.opnsense.haproxy_acl:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Modified test ACL for host matching'
        expression: 'hdr'
        hdr: 'modified.example.com'
        negate: false
        case_sensitive: true
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed
      when: not ansible_check_mode

    - name: Nothing changed
      oxlorg.opnsense.haproxy_acl:
        name: 'ANSIBLE_TEST_1_1'
        description: 'Modified test ACL for host matching'
        expression: 'hdr'
        hdr: 'modified.example.com'
        negate: false
        case_sensitive: true
      register: opn8
      failed_when: >
        opn8.failed or
        opn8.changed
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.haproxy_acl:
        name: "{{ item }}"
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_1_1'
        - 'ANSIBLE_TEST_1_2'
        - 'ANSIBLE_TEST_1_3'
        - 'ANSIBLE_TEST_1_4'
        - 'ANSIBLE_TEST_ACL_1'
      when: not ansible_check_mode
