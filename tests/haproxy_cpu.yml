---

- name: Testing HAProxy CPU affinity rules
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/ansibleguy.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    ansibleguy.opnsense.list:
      target: 'haproxy_cpu'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Cleanup existing entries first
      ansibleguy.opnsense.haproxy_cpu:
        name: 'ANSIBLE_TEST_1_1'
        state: 'absent'
      register: opn_clean
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_pre1
      failed_when: >
        'data' not in opn_pre1

    - name: Removing - does not exist
      ansibleguy.opnsense.haproxy_cpu:
        name: 'ANSIBLE_TEST_1_1'
        state: 'absent'
      register: opn_pre2
      failed_when: >
        opn_pre2.failed or
        opn_pre2.changed

    - name: Adding 1 - failing because of invalid name
      ansibleguy.opnsense.haproxy_cpu:
        name: 'INVALID NAME WITH SPACES!'
        thread_id: 'x1'
        cpu_id: ['x0']
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Adding 1 - failing because of invalid thread_id
      ansibleguy.opnsense.haproxy_cpu:
        name: 'ANSIBLE_TEST_1_1'
        thread_id: 'x100'
        cpu_id: ['x0']
      register: opn_fail2
      failed_when: not opn_fail2.failed
      when: not ansible_check_mode

    - name: Adding 1
      ansibleguy.opnsense.haproxy_cpu:
        name: 'ANSIBLE_TEST_1_1'
        enabled: true
        thread_id: 'x1'
        cpu_id: ['x0']
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing 1
      ansibleguy.opnsense.haproxy_cpu:
        name: 'ANSIBLE_TEST_1_1'
        enabled: true
        thread_id: 'x2'
        cpu_id: ['x0', 'x1']
      register: opn9
      failed_when: >
        opn9.failed or
        not opn9.changed

    - name: Disabling 1
      ansibleguy.opnsense.haproxy_cpu:
        name: 'ANSIBLE_TEST_1_1'
        enabled: false
        thread_id: 'x2'
        cpu_id: ['x0', 'x1']
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed
      when: not ansible_check_mode

    - name: Disabling 1 - nothing changed
      ansibleguy.opnsense.haproxy_cpu:
        name: 'ANSIBLE_TEST_1_1'
        enabled: false
        thread_id: 'x2'
        cpu_id: ['x0', 'x1']
      register: opn3
      failed_when: >
        opn3.failed or
        opn3.changed
      when: not ansible_check_mode

    - name: Enabling 1
      ansibleguy.opnsense.haproxy_cpu:
        name: 'ANSIBLE_TEST_1_1'
        enabled: true
        thread_id: 'x2'
        cpu_id: ['x0', 'x1']
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed
      when: not ansible_check_mode

    - name: Adding 2
      ansibleguy.opnsense.haproxy_cpu:
        name: 'ANSIBLE_TEST_1_2'
        enabled: true
        thread_id: 'x3'
        cpu_id: ['x2']
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed

    - name: Adding 2 - nothing changed
      ansibleguy.opnsense.haproxy_cpu:
        name: 'ANSIBLE_TEST_1_2'
        enabled: true
        thread_id: 'x3'
        cpu_id: ['x2']
      register: opn6
      failed_when: >
        opn6.failed or
        opn6.changed
      when: not ansible_check_mode

    - name: Removing 2
      ansibleguy.opnsense.haproxy_cpu:
        name: 'ANSIBLE_TEST_1_2'
        state: 'absent'
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn8
      failed_when: >
        'data' not in opn8 or
        opn8.data | length != 1
      when: not ansible_check_mode

    - name: Cleanup
      ansibleguy.opnsense.haproxy_cpu:
        name: "{{ item }}"
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_1_1'
        - 'ANSIBLE_TEST_1_2'
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_clean1
      failed_when: >
        'data' not in opn_clean1 or
        opn_clean1.data | length != 0
      when: not ansible_check_mode
