---

- name: Testing Shaper Rules
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'shaper_rule'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn10
      failed_when: >
        'data' not in opn10 or
        opn10.data | length != 0

    - name: Adding dummy pipe
      oxlorg.opnsense.shaper_pipe:
        description: 'ANSIBLE_TEST_3_1'
        bandwidth: 50
      check_mode: false

    - name: Adding dummy queue
      oxlorg.opnsense.shaper_queue:
        description: 'ANSIBLE_TEST_2_1'
        pipe: 'ANSIBLE_TEST_3_1'
        weight: 50
      check_mode: false

    - name: Removing - does not exist
      oxlorg.opnsense.shaper_rule:
        description: 'ANSIBLE_TEST_1_1'
        target_pipe: 'ANSIBLE_TEST_3_1'
        state: 'absent'
      register: opn1
      failed_when: >
        opn1.failed or
        opn1.changed

    - name: Adding 1 - failing because of invalid int-value
      oxlorg.opnsense.shaper_rule:
        description: 'ANSIBLE_TEST_1_1'
        target_pipe: 'ANSIBLE_TEST_3_1'
        max_packet_length: 100000
      register: opn11
      failed_when: not opn11.failed

    - name: Adding 1 - failing because of unprovided target
      oxlorg.opnsense.shaper_rule:
        description: 'ANSIBLE_TEST_1_1'
      register: opn12
      failed_when: not opn12.failed

    - name: Adding 1 - failing because of non-existant pipe
      oxlorg.opnsense.shaper_rule:
        description: 'ANSIBLE_TEST_1_1'
        target_pipe: 'does-not-exist'
      register: opn13
      failed_when: not opn13.failed

    - name: Adding 1 - failing because of non-existant queue
      oxlorg.opnsense.shaper_rule:
        description: 'ANSIBLE_TEST_1_1'
        target_queue: 'does-not-exist'
      register: opn14
      failed_when: not opn14.failed

    - name: Adding 1
      oxlorg.opnsense.shaper_rule:
        description: 'ANSIBLE_TEST_1_1'
        target_queue: 'ANSIBLE_TEST_2_1'
        protocol: 'tcp'
        destination_port: 80-90
        sequence: 40
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed

    - name: Changing 1
      oxlorg.opnsense.shaper_rule:
        description: 'ANSIBLE_TEST_1_1'
        target_queue: 'ANSIBLE_TEST_2_1'
        protocol: 'tcp'
        destination_port: 443
        sequence: 50
      register: opn15
      failed_when: >
        opn15.failed or
        not opn15.changed
      when: not ansible_check_mode

    - name: Disabling 1
      oxlorg.opnsense.shaper_rule:
        description: 'ANSIBLE_TEST_1_1'
        target_queue: 'ANSIBLE_TEST_2_1'
        protocol: 'tcp'
        destination_port: 443
        enabled: false
        sequence: 50
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed
      when: not ansible_check_mode

    - name: Disabling 1 - nothing changed
      oxlorg.opnsense.shaper_rule:
        description: 'ANSIBLE_TEST_1_1'
        target_queue: 'ANSIBLE_TEST_2_1'
        protocol: 'tcp'
        destination_port: 443
        enabled: false
        sequence: 50
      register: opn9
      failed_when: >
        opn9.failed or
        opn9.changed
      when: not ansible_check_mode

    - name: Enabling 1
      oxlorg.opnsense.shaper_rule:
        description: 'ANSIBLE_TEST_1_1'
        target_queue: 'ANSIBLE_TEST_2_1'
        protocol: 'tcp'
        destination_port: 443
        sequence: 50
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed
      when: not ansible_check_mode

    - name: Adding 2 & flushing/resetting running config
      oxlorg.opnsense.shaper_rule:
        description: 'ANSIBLE_TEST_1_2'
        target_pipe: 'ANSIBLE_TEST_3_1'
        destination_invert: true
        destination: '172.16.0.0/12'
        sequence: 60
        reset: true
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed

    - name: Adding 2 - nothing changed
      oxlorg.opnsense.shaper_rule:
        description: 'ANSIBLE_TEST_1_2'
        target_pipe: 'ANSIBLE_TEST_3_1'
        destination_invert: true
        destination: '172.16.0.0/12'
        sequence: 60
      register: opn13
      failed_when: >
        opn13.failed or
        opn13.changed
      when: not ansible_check_mode

    - name: Adding 2 - changing
      oxlorg.opnsense.shaper_rule:
        description: 'ANSIBLE_TEST_1_2'
        target_pipe: 'ANSIBLE_TEST_3_1'
        destination_invert: true
        destination: ['172.16.0.0/12', '192.168.0.0/29']
        sequence: 60
      register: opn17
      failed_when: >
        opn17.failed or
        not opn17.changed
      when: not ansible_check_mode

    - name: Adding 2 - nothing changing
      oxlorg.opnsense.shaper_rule:
        description: 'ANSIBLE_TEST_1_2'
        target_pipe: 'ANSIBLE_TEST_3_1'
        destination_invert: true
        destination: ['172.16.0.0/12', '192.168.0.0/29']
        sequence: 60
      register: opn18
      failed_when: >
        opn18.failed or
        opn18.changed
      when: not ansible_check_mode

    - name: Removing 2
      oxlorg.opnsense.shaper_rule:
        description: 'ANSIBLE_TEST_1_2'
        state: 'absent'
      register: opn8
      failed_when: >
        opn8.failed or
        not opn8.changed
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn3
      failed_when: >
        'data' not in opn3 or
        opn3.data | length != 1
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.shaper_rule:
        description: "{{ item }}"
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_1_1'
        - 'ANSIBLE_TEST_1_2'
      when: not ansible_check_mode

    - name: Cleanup queue
      oxlorg.opnsense.shaper_queue:
        description: 'ANSIBLE_TEST_2_1'
        state: 'absent'
      check_mode: false

    - name: Cleanup pipe
      oxlorg.opnsense.shaper_pipe:
        description: 'ANSIBLE_TEST_3_1'
        state: 'absent'
      check_mode: false

    - name: Listing
      oxlorg.opnsense.list:
      register: opn2
      failed_when: >
        'data' not in opn2 or
        opn2.data | length != 0
      when: not ansible_check_mode
