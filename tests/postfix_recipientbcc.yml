---

- name: Testing Postfix Recipient BCC
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/ansibleguy.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    ansibleguy.opnsense.list:
      target: 'postfix_recipientbcc'

  tasks:
    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_pre1
      failed_when: >
        'data' not in opn_pre1 or
        opn_pre1.data | length != 0

    - name: Removing - does not exist
      ansibleguy.opnsense.postfix_recipientbcc:
        address: 'ANSIBLE_TEST_99_9'
        state: 'absent'
      register: opn_pre2
      failed_when: >
        opn_pre2.failed or
        opn_pre2.changed

    - name: Adding 1 - failing because of missing to value
      ansibleguy.opnsense.postfix_recipientbcc:
        address: alice@example.com
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Adding 1
      ansibleguy.opnsense.postfix_recipientbcc:
        address: alice@example.com
        to: bob@example.com
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing 1
      ansibleguy.opnsense.postfix_recipientbcc:
        address: alice@example.com
        to:
          - bob@example.com
          - carol@example.com
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Disabling 1
      ansibleguy.opnsense.postfix_recipientbcc:
        address: alice@example.com
        to:
          - bob@example.com
          - carol@example.com
        enabled: false
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed
      when: not ansible_check_mode

    - name: Disabling 1 - nothing changed
      ansibleguy.opnsense.postfix_recipientbcc:
        address: alice@example.com
        to:
          - bob@example.com
          - carol@example.com
        enabled: false
      register: opn4
      failed_when: >
        opn4.failed or
        opn4.changed
      when: not ansible_check_mode

    - name: Enabling 1
      ansibleguy.opnsense.postfix_recipientbcc:
        address: alice@example.com
        to:
          - bob@example.com
          - carol@example.com
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Adding 2
      ansibleguy.opnsense.postfix_recipientbcc:
        address: bob@example.com
        to: carol@example.com
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed

    - name: Adding 2 - nothing changed
      ansibleguy.opnsense.postfix_recipientbcc:
        address: bob@example.com
        to: carol@example.com
      register: opn7
      failed_when: >
        opn7.failed or
        opn7.changed
      when: not ansible_check_mode

    - name: Removing 2
      ansibleguy.opnsense.postfix_recipientbcc:
        address: bob@example.com
        state: absent
      register: opn8
      failed_when: >
        opn8.failed or
        not opn8.changed
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn9
      failed_when: >
        'data' not in opn9 or
        opn9.data | length != 1
      when: not ansible_check_mode

    - name: Cleanup
      ansibleguy.opnsense.postfix_recipientbcc:
        address: alice@example.com
        state: 'absent'
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_clean1
      failed_when: >
        'data' not in opn_clean1 or
        opn_clean1.data | length != 0
      when: not ansible_check_mode
