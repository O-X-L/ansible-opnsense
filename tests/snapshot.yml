---

- name: Testing Snapshot
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/ansibleguy.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    ansibleguy.opnsense.list:
      target: 'snapshot'

  tasks:
    - name: Checking filesystem (only works for ZFS)
      ansibleguy.opnsense.snapshot:
        name: 'ANSIBLE_TEST_1_1'
      failed_when: false
      check_mode: false
      changed_when: false
      register: opn_test

    - name: Setting filesystem status
      ansible.builtin.set_fact:
        opn_zfs: "{{ 'Unsupported' not in opn_test.msg|default('') }}"

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_pre1
      when: opn_zfs | bool
      failed_when: >
        'data' not in opn_pre1 or
        opn_pre1.data | length != 1

    - name: Removing - does not exist
      ansibleguy.opnsense.snapshot:
        name: 'ANSIBLE_TEST_1_1'
        state: 'absent'
      register: opn_pre2
      when: opn_zfs | bool
      failed_when: >
        opn_pre2.failed or
        opn_pre2.changed

    - name: Adding 1 - failing because of invalid name
      ansibleguy.opnsense.snapshot:
        name: 'INVALID NAME'
      register: opn_fail1
      failed_when: not opn_fail1.failed
      when:
        - opn_zfs | bool
        - not ansible_check_mode

    - name: Adding 1
      ansibleguy.opnsense.snapshot:
        name: 'ANSIBLE_TEST_1_1'
      register: opn1
      when: opn_zfs | bool
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Adding 2
      ansibleguy.opnsense.snapshot:
        name: 'ANSIBLE_TEST_1_2'
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed
      when:
        - opn_zfs | bool
        - not ansible_check_mode

    - name: Adding 2 - nothing changed
      ansibleguy.opnsense.snapshot:
        name: 'ANSIBLE_TEST_1_2'
      register: opn3
      failed_when: >
        opn3.failed or
        opn3.changed
      when:
        - opn_zfs | bool
        - not ansible_check_mode

    - name: Activate 2
      ansibleguy.opnsense.snapshot:
        name: 'ANSIBLE_TEST_1_2'
        activate: true
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed
      when:
        - opn_zfs | bool
        - not ansible_check_mode

    - name: Removing 2
      ansibleguy.opnsense.snapshot:
        name: 'ANSIBLE_TEST_1_2'
        state: 'absent'
      register: opn5
      failed_when: >
        not opn5.failed or
        opn5.changed
      when:
        - opn_zfs | bool
        - not ansible_check_mode

    - name: Activate default
      ansibleguy.opnsense.snapshot:
        name: 'default'
        activate: true
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed
      when:
        - opn_zfs | bool
        - not ansible_check_mode

    - name: Removing 2
      ansibleguy.opnsense.snapshot:
        name: 'ANSIBLE_TEST_1_2'
        state: 'absent'
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed
      when:
        - opn_zfs | bool
        - not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn8
      failed_when: >
        'data' not in opn8 or
        opn8.data | length != 2
      when:
        - opn_zfs | bool
        - not ansible_check_mode

    - name: Cleanup
      ansibleguy.opnsense.snapshot:
        name: '{{ item }}'
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_1_1'
        - 'ANSIBLE_TEST_1_2'
      when:
        - opn_zfs | bool
        - not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_clean1
      failed_when: >
        'data' not in opn_clean1 or
        opn_clean1.data | length != 1
      when:
        - opn_zfs | bool
        - not ansible_check_mode
