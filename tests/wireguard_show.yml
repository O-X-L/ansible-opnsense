---

- name: Testing WireGuard info querying
  hosts: localhost
  gather_facts: no
  module_defaults:
    oxlorg.opnsense.wireguard_show:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_CREDS_FILE') }}"
      ssl_verify: false

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Showing config
      oxlorg.opnsense.wireguard_show:
      register: opn1
      failed_when: >
        opn1.failed or
        'data' not in opn1
