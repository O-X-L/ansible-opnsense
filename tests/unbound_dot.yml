---

# todo: test default matching

- name: Testing Unbound DNS-over-TLS
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.unbound_dot:
      timeout: 60

    oxlorg.opnsense.list:
      target: 'unbound_dot'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing dots
      oxlorg.opnsense.list:
      register: opn10
      failed_when: >
        'data' not in opn10 or
        opn10.data | length != 0

    - name: Removing - does not exist
      oxlorg.opnsense.unbound_dot:
        domain: 'dot.opnsense.test.oxlorg.net'
        target: '1.1.1.1'
        verify: 'dot.opnsense.test.oxlorg.net'
        state: 'absent'
        reload: false
      register: opn1
      failed_when: >
        opn1.failed or
        opn1.changed

    - name: Adding 1 - failing because of invalid verfiy-content
      oxlorg.opnsense.unbound_dot:
        domain: 'dot.opnsense.test.oxlorg.net'
        target: '1.1.1.1'
        verify: 'Some CN'
        reload: false  # speed
      register: opn11
      failed_when: not opn11.failed

    - name: Adding 1
      oxlorg.opnsense.unbound_dot:
        domain: 'dot.opnsense.test.oxlorg.net'
        target: '1.1.1.1'
        verify: 'dot.opnsense.test.oxlorg.net'
        reload: false  # speed
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed

    - name: Adding 2
      oxlorg.opnsense.unbound_dot:
        domain: 'dot.opnsense.test.oxlorg.net'
        target: '1.1.1.2'
        verify: 'dot.opnsense.test.oxlorg.net'
        reload: false  # speed
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed

    - name: Disabling 2
      oxlorg.opnsense.unbound_dot:
        domain: 'dot.opnsense.test.oxlorg.net'
        target: '1.1.1.2'
        verify: 'dot.opnsense.test.oxlorg.net'
        enabled: false
        reload: false  # speed
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed
      when: not ansible_check_mode

    - name: Disabling 2 - nothing changed
      oxlorg.opnsense.unbound_dot:
        domain: 'dot.opnsense.test.oxlorg.net'
        target: '1.1.1.2'
        verify: 'dot.opnsense.test.oxlorg.net'
        enabled: false
        reload: false  # speed
      register: opn9
      failed_when: >
        opn9.failed or
        opn9.changed
      when: not ansible_check_mode

    - name: Enabling 2
      oxlorg.opnsense.unbound_dot:
        domain: 'dot.opnsense.test.oxlorg.net'
        target: '1.1.1.2'
        verify: 'dot.opnsense.test.oxlorg.net'
        reload: false  # speed
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed
      when: not ansible_check_mode

    - name: Removing 2
      oxlorg.opnsense.unbound_dot:
        domain: 'dot.opnsense.test.oxlorg.net'
        target: '1.1.1.2'
        verify: 'dot.opnsense.test.oxlorg.net'
        state: 'absent'
        reload: false  # speed
      register: opn8
      failed_when: >
        opn8.failed or
        not opn8.changed
      when: not ansible_check_mode

    - name: Listing dots
      oxlorg.opnsense.list:
      register: opn3
      failed_when: >
        'data' not in opn3 or
        opn3.data | length != 1
      when: not ansible_check_mode

    - name: Adding 3 without domain
      oxlorg.opnsense.unbound_dot:
        target: '1.1.1.3'
        verify: 'dot.opnsense.test.oxlorg.net'
        reload: false  # speed
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed

    - name: Changing 3 port
      oxlorg.opnsense.unbound_dot:
        target: '1.1.1.3'
        verify: 'dot.opnsense.test.oxlorg.net'
        port: 853
        reload: false  # speed
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed

    - name: Removing 3
      oxlorg.opnsense.unbound_dot:
        target: '1.1.1.3'
        verify: 'dot.opnsense.test.oxlorg.net'
        state: 'absent'
        reload: false
      when: not ansible_check_mode

    - name: Adding 4 without domain or verify
      oxlorg.opnsense.unbound_dot:
        target: '1.1.1.4'
        reload: false  # speed
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed

    - name: Cleanup
      oxlorg.opnsense.unbound_dot:
        target: "{{ item }}"
        state: 'absent'
        reload: false
      loop:
        - '1.1.1.1'
        - '1.1.1.2'
        - '1.1.1.3'
        - '1.1.1.4'
      when: not ansible_check_mode

    - name: Listing dots
      oxlorg.opnsense.list:
      register: opn2
      failed_when: >
        'data' not in opn2 or
        opn2.data | length != 0
      when: not ansible_check_mode
