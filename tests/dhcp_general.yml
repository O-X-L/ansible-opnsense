---

- name: Testing DHCP Setting
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'dhcp_general'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        opn_pre1.failed or
        'data' not in opn_pre1

    - name: Configuring - failing because of invalid lifetime
      oxlorg.opnsense.dhcp_general:
        lifetime: -1
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Configuring
      oxlorg.opnsense.dhcp_general:
        enabled: true
        interfaces: ['opt1']
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing
      oxlorg.opnsense.dhcp_general:
        enabled: true
        interfaces: ['opt1', 'lan']
        fw_rules: false
        lifetime: 5000
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed
      when: not ansible_check_mode

    - name: Nothing changed
      oxlorg.opnsense.dhcp_general:
        enabled: true
        interfaces: ['opt1', 'lan']
        fw_rules: false
        lifetime: 5000
      register: opn3
      failed_when: >
        opn3.failed or
        opn3.changed
      when: not ansible_check_mode

    - name: Configuring with HA
      oxlorg.opnsense.dhcp_general:
        enabled: true
        interfaces: ['opt1']
        ha:
          enabled: true
          this_server_name: 'primary'
          max_unacked_clients: 2
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed
      when: not ansible_check_mode

    - name: Configuring with HA - Nothing changed
      oxlorg.opnsense.dhcp_general:
        enabled: true
        interfaces: ['opt1']
        ha:
          enabled: true
          this_server_name: 'primary'
          max_unacked_clients: 2
      register: opn5
      failed_when: >
        opn5.failed or
        opn5.changed
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.dhcp_general:
        enabled: false
