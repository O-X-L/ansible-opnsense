---

- name: Testing Interface Groups
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_CREDS_FILE') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'rule_interface_group'

  vars:
    if_grp: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL_RULE_GRP_IF') | default('lan', true) }}"
    default_grps: ['All OpenVPN interfaces', 'IPsec', 'WireGuard']

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        'data' not in opn_pre1 or
        (opn_pre1.data | length) != (default_grps | length)

    - name: Removing - does not exist
      oxlorg.opnsense.rule_interface_group:
        name: 'ANSIBLE_TEST'
        state: 'absent'
      register: opn_pre2
      failed_when: >
        opn_pre2.failed or
        opn_pre2.changed

    - name: Adding 1 - failing because of invalid interface (server-side)
      oxlorg.opnsense.rule_interface_group:
        name: 'ANSIBLE_TEST'
        members: 'abc'
      register: opn_fail1
      failed_when: not opn_fail1.failed
      when: not ansible_check_mode

    - name: Adding 1 - failing because of missing members
      oxlorg.opnsense.rule_interface_group:
        name: 'ANSIBLE_TEST'
      register: opn_fail2
      failed_when: not opn_fail2.failed

    - name: Adding 1
      oxlorg.opnsense.rule_interface_group:
        name: 'ANSIBLE_TEST'
        members: "{{ if_grp }}"
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Adding 1 - nothing changed
      oxlorg.opnsense.rule_interface_group:
        name: 'ANSIBLE_TEST'
        members: "{{ if_grp }}"
      register: opn2
      failed_when: >
        opn2.failed or
        opn2.changed
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn3
      failed_when: >
        'data' not in opn3 or
        (opn3.data | length) != (default_grps | length + 1)
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.rule_interface_group:
        name: 'ANSIBLE_TEST'
        state: 'absent'
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn_clean1
      failed_when: >
        'data' not in opn_clean1 or
        (opn_clean1.data | length) != (default_grps | length)
      when: not ansible_check_mode
