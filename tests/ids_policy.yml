---

- name: Testing IDS Policy
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'ids_policy'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        opn_pre1.failed or
        'data' not in opn_pre1

    - name: Adding 1 - failing because of non-existing/disabled ruleset
      oxlorg.opnsense.ids_policy:
        description: 'ANSIBLE_TEST_1_1'
        rulesets: "{{ item }}"
        enabled: true
      register: opn_fail1
      failed_when: not opn_fail1.failed
      loop:
        - 'DOES-NOT-EXIST'
        - 'abuse.ch/SSL IP Blacklist'

    - name: Adding 1
      oxlorg.opnsense.ids_policy:
        description: 'ANSIBLE_TEST_1_1'
        priority: 1
        rulesets: 'ET open/drop'
        action: ['drop']
        new_action: 'alert'
        rules:
          classtype: ['misc-attack', 'bad-unknown']
          signature_severity: ['Minor']

    - name: Adding 1 - nothing changed
      oxlorg.opnsense.ids_policy:
        description: 'ANSIBLE_TEST_1_1'
        priority: 1
        rulesets: 'ET open/drop'
        action: ['drop']
        new_action: 'alert'
        rules:
          classtype: ['misc-attack', 'bad-unknown']
          signature_severity: ['Minor']
      register: opn6
      failed_when: >
        opn6.failed or
        opn6.changed
      when: not ansible_check_mode

    - name: Changing 1
      oxlorg.opnsense.ids_policy:
        description: 'ANSIBLE_TEST_1_1'
        priority: 2
        rulesets: 'ET open/drop'
        action: ['alert', 'drop']
        new_action: 'alert'
        rules:
          signature_severity: ['Minor']
          tag: 'Dshield'
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed
      when: not ansible_check_mode

    - name: Changing 1 - nothing changed
      oxlorg.opnsense.ids_policy:
        description: 'ANSIBLE_TEST_1_1'
        priority: 2
        rulesets: 'ET open/drop'
        action: ['alert', 'drop']
        new_action: 'alert'
        rules:
          signature_severity: 'Minor'
          tag: 'Dshield'
      register: opn5
      failed_when: >
        opn5.failed or
        opn5.changed
      when: not ansible_check_mode

    - name: Disabling 1
      oxlorg.opnsense.ids_policy:
        description: 'ANSIBLE_TEST_1_1'
        priority: 2
        rulesets: 'ET open/drop'
        action: ['alert', 'drop']
        new_action: 'alert'
        rules:
          signature_severity: ['Minor']
          tag: 'Dshield'
        enabled: false
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed
      when: not ansible_check_mode

    - name: Disabling 1 - nothing changed
      oxlorg.opnsense.ids_policy:
        description: 'ANSIBLE_TEST_1_1'
        priority: 2
        rulesets: 'ET open/drop'
        action: ['alert', 'drop']
        new_action: 'alert'
        rules:
          signature_severity: ['Minor']
          tag: 'Dshield'
        enabled: false
      register: opn3
      failed_when: >
        opn3.failed or
        opn3.changed
      when: not ansible_check_mode

    - name: Enabling 1
      oxlorg.opnsense.ids_policy:
        description: 'ANSIBLE_TEST_1_1'
        priority: 2
        rulesets: 'ET open/drop'
        action: ['alert', 'drop']
        new_action: 'alert'
        rules:
          signature_severity: ['Minor']
          tag: 'Dshield'
        enabled: true
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.ids_policy:
        description: 'ANSIBLE_TEST_1_1'
        state: absent
      when: not ansible_check_mode
