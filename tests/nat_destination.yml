---

- name: Testing destination-nat
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.nat_destination:
      match_fields: ['description']

    oxlorg.opnsense.list:
      target: 'nat_destination'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        'data' not in opn_pre1 or
        opn_pre1.data | length != 0

    - name: Removing - does not exist
      oxlorg.opnsense.nat_destination:
        description: 'ANSIBLE_TEST_1_1'
        state: 'absent'
      register: opn_pre2
      failed_when: >
        opn_pre2.failed or
        opn_pre2.changed

    - name: Adding 1 - failing because of invalid alias (server-side)
      oxlorg.opnsense.nat_destination:
        description: 'ANSIBLE_TEST_1_1'
        interface: 'wan'
        destination: 'DoesNotExist'
        destination_port: 80
        target: '192.168.0.10'
        target_port: 8080
      register: opn_fail1
      failed_when: not opn_fail1.failed
      when: not ansible_check_mode

    - name: Adding 1
      oxlorg.opnsense.nat_destination:
        description: 'ANSIBLE_TEST_1_1'
        interface: 'wan'
        destination: '192.168.0.1'
        destination_port: 80
        target: '192.168.0.10'
        target_port: 8080
        protocol: 'TCP'
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing 1
      oxlorg.opnsense.nat_destination:
        description: 'ANSIBLE_TEST_1_1'
        interface: 'wan'
        destination: '192.168.0.1'
        destination_port: 80
        target: '192.168.0.20'
        target_port: 8080
        protocol: 'TCP'
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Disabling 1
      oxlorg.opnsense.nat_destination:
        description: 'ANSIBLE_TEST_1_1'
        interface: 'wan'
        destination: '192.168.0.1'
        destination_port: 80
        target: '192.168.0.20'
        target_port: 8080
        protocol: 'TCP'
        enabled: false
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed
      when: not ansible_check_mode

    - name: Disabling 1 - nothing changed
      oxlorg.opnsense.nat_destination:
        description: 'ANSIBLE_TEST_1_1'
        interface: 'wan'
        destination: '192.168.0.1'
        destination_port: 80
        target: '192.168.0.20'
        target_port: 8080
        protocol: 'TCP'
        enabled: false
      register: opn4
      failed_when: >
        opn4.failed or
        opn4.changed
      when: not ansible_check_mode

    - name: Enabling 1
      oxlorg.opnsense.nat_destination:
        description: 'ANSIBLE_TEST_1_1'
        interface: 'wan'
        destination: '192.168.0.1'
        destination_port: 80
        target: '192.168.0.20'
        target_port: 8080
        protocol: 'TCP'
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Adding 2
      oxlorg.opnsense.nat_destination:
        description: 'ANSIBLE_TEST_1_2'
        interface: 'wan'
        source: '192.168.0.0/24'
        destination: '192.168.0.1'
        destination_port: 80
        protocol: 'TCP'
        target: '192.168.0.30'
        target_port: 8080
        nat_reflection: 'purenat'
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed

    - name: Adding 2 - nothing changed
      oxlorg.opnsense.nat_destination:
        description: 'ANSIBLE_TEST_1_2'
        interface: 'wan'
        source: '192.168.0.0/24'
        destination: '192.168.0.1'
        destination_port: 80
        protocol: 'TCP'
        target: '192.168.0.30'
        target_port: 8080
        nat_reflection: 'purenat'
      register: opn7
      failed_when: >
        opn7.failed or
        opn7.changed
      when: not ansible_check_mode

    - name: Removing 2
      oxlorg.opnsense.nat_destination:
        description: 'ANSIBLE_TEST_1_2'
        state: 'absent'
      register: opn8
      failed_when: >
        opn8.failed or
        not opn8.changed
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn9
      failed_when: >
        'data' not in opn9 or
        opn9.data | length != 1
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.nat_destination:
        description: "{{ item }}"
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_1_1'
        - 'ANSIBLE_TEST_1_2'
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn_clean1
      failed_when: >
        'data' not in opn_clean1 or
        opn_clean1.data | length != 0
      when: not ansible_check_mode
