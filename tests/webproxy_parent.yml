---

- name: WebProxy ProxyParent Settings
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_CREDS_FILE') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'webproxy_parent'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        opn_pre1.failed or
        'data' not in opn_pre1

    - name: Configuring - failing because of missing host
      oxlorg.opnsense.webproxy_parent:
        enabled: true
        port: 1000
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Configuring - failing because of missing port
      oxlorg.opnsense.webproxy_parent:
        enabled: true
        host: '192.168.0.1'
      register: opn_fail2
      failed_when: not opn_fail2.failed

    - name: Configuring - failing because of invalid host
      oxlorg.opnsense.webproxy_parent:
        enabled: true
        host: '192.168.0.1000'
        port: 1000
      register: opn_fail3
      failed_when: not opn_fail3.failed

    - name: Configuring
      oxlorg.opnsense.webproxy_parent:
        auth: true
        host: '192.168.0.1'
        port: 1000
        user: 'test'
        password: 'secret'
        local_ips: ['192.168.10.0/24', '192.168.2.0/29']
        local_domains: ['oxlorg.lan']
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing 1
      oxlorg.opnsense.webproxy_parent:
        auth: true
        host: '192.168.0.10'
        port: 1500
        user: 'test'
        password: 'secret_new'
        local_ips: ['192.168.10.0/24', '192.168.3.0/29']
        local_domains: ['oxlorg.lan']
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed
      when: not ansible_check_mode

    - name: Disabling 1
      oxlorg.opnsense.webproxy_parent:
        auth: true
        host: '192.168.0.10'
        port: 1500
        user: 'test'
        password: 'secret_new'
        local_ips: ['192.168.10.0/24', '192.168.3.0/29']
        local_domains: ['oxlorg.lan']
        enabled: false
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed
      when: not ansible_check_mode

    - name: Disabling 1 - nothing changed
      oxlorg.opnsense.webproxy_parent:
        auth: true
        host: '192.168.0.10'
        port: 1500
        user: 'test'
        password: 'secret_new'
        local_ips: ['192.168.10.0/24', '192.168.3.0/29']
        local_domains: ['oxlorg.lan']
        enabled: false
      register: opn4
      failed_when: >
        opn4.failed or
        opn4.changed
      when: not ansible_check_mode

    - name: Enabling 1
      oxlorg.opnsense.webproxy_parent:
        auth: true
        host: '192.168.0.10'
        port: 1500
        user: 'test'
        password: 'secret_new'
        local_ips: ['192.168.10.0/24', '192.168.3.0/29']
        local_domains: ['oxlorg.lan']
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.webproxy_parent:
        enabled: false
      when: not ansible_check_mode
