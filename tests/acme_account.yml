---

- name: Testing ACME Account
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/ansibleguy.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    ansibleguy.opnsense.list:
      target: 'acme_account'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_pre1
      failed_when: >
        'data' not in opn_pre1 or
        opn_pre1.data | length != 0

    - name: Removing - does not exist
      ansibleguy.opnsense.acme_account:
        name: 'ANSIBLE_TEST_1_1'
        state: 'absent'
      register: opn_pre2
      failed_when: >
        opn_pre2.failed or
        opn_pre2.changed

    - name: Adding 1 - failing because of invalid ca
      ansibleguy.opnsense.acme_account:
        name: 'ANSIBLE_TEST_1_1'
        ca: opnsense
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Adding 1
      ansibleguy.opnsense.acme_account:
        name: 'ANSIBLE_TEST_1_1'
        ca: letsencrypt_test
        email: example@example.com
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing 1
      ansibleguy.opnsense.acme_account:
        name: 'ANSIBLE_TEST_1_1'
        description: letsencrypt_test
        ca: letsencrypt_test
        email: example@example.com
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Changing 1 - nothing changed
      ansibleguy.opnsense.acme_account:
        name: 'ANSIBLE_TEST_1_1'
        description: letsencrypt_test
        ca: letsencrypt_test
        email: example@example.com
      register: opn3
      failed_when: >
        opn3.failed or
        opn3.changed
      when: not ansible_check_mode

    - name: Disabling 1
      ansibleguy.opnsense.acme_account:
        name: 'ANSIBLE_TEST_1_1'
        description: letsencrypt_test
        ca: letsencrypt_test
        email: example@example.com
        enabled: false
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed
      when: not ansible_check_mode

    - name: Disabling 1 - nothing changed
      ansibleguy.opnsense.acme_account:
        name: 'ANSIBLE_TEST_1_1'
        description: letsencrypt_test
        ca: letsencrypt_test
        email: example@example.com
        enabled: false
      register: opn5
      failed_when: >
        opn5.failed or
        opn5.changed
      when: not ansible_check_mode

    - name: Enabling 1
      ansibleguy.opnsense.acme_account:
        name: 'ANSIBLE_TEST_1_1'
        description: letsencrypt_test
        ca: letsencrypt_test
        email: example@example.com
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed
      when: not ansible_check_mode

    - name: Adding 2
      ansibleguy.opnsense.acme_account:
        name: 'ANSIBLE_TEST_1_2'
        ca: custom
        email: example@example.com
        custom_ca: 'https://example.com/acme/directory'
      register: opn9
      failed_when: >
        opn9.failed or
        not opn9.changed

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn8
      failed_when: >
        'data' not in opn8 or
        opn8.data | length != 2
      when: not ansible_check_mode

    - name: Cleanup
      ansibleguy.opnsense.acme_account:
        name: '{{ item }}'
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_1_1'
        - 'ANSIBLE_TEST_1_2'
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_clean1
      failed_when: >
        'data' not in opn_clean1 or
        opn_clean1.data | length != 0
      when: not ansible_check_mode
