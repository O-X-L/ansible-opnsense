---

- name: Testing Bridge interfaces
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/ansibleguy.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    ansibleguy.opnsense.list:
      target: 'interface_bridge'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_pre1
      failed_when: >
        'data' not in opn_pre1 or
        opn_pre1.data | length != 0

    - name: Removing - does not exist
      ansibleguy.opnsense.interface_bridge:
        description: 'ANSIBLE_TEST_1_1'
        state: 'absent'
      register: opn_pre2
      failed_when: >
        opn_pre2.failed or
        opn_pre2.changed

    - name: Adding 1
      ansibleguy.opnsense.interface_bridge:
        description: 'ANSIBLE_TEST_1_1'
        members:
          - 'lan'
          - 'opt1'
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing 1
      ansibleguy.opnsense.interface_bridge:
        description: 'ANSIBLE_TEST_1_1'
        members: 'lan'
        link_local: true
        span_interfaces: 'opt1'
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Changing 1 - nothing changed
      ansibleguy.opnsense.interface_bridge:
        description: 'ANSIBLE_TEST_1_1'
        members: 'lan'
        link_local: true
        span_interfaces: 'opt1'
      register: opn3
      failed_when: >
        opn3.failed or
        opn3.changed
      when: not ansible_check_mode

    - name: Adding 2
      ansibleguy.opnsense.interface_bridge:
        description: 'ANSIBLE_TEST_1_2'
        members:
          - 'lan'
          - 'opt1'
        link_local: true
        stp: true
        stp_proto: 'stp'
        stp_interfaces: 'lan'
        stp_max_age: 10
        stp_fwdelay: 10
        stp_hold: 5
        cache_size: 1000
        cache_timeout: 600
        edge_interfaces: 'lan'
        auto_edge_interfaces: 'opt1'
        ptp_interfaces: 'lan'
        auto_ptp_interfaces: 'opt1'
        static_interfaces: 'lan'
        private_interfaces: 'opt1'
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed

    - name: Adding 2 - nothing changed
      ansibleguy.opnsense.interface_bridge:
        description: 'ANSIBLE_TEST_1_2'
        members:
          - 'lan'
          - 'opt1'
        link_local: true
        stp: true
        stp_proto: 'stp'
        stp_interfaces: 'lan'
        stp_max_age: 10
        stp_fwdelay: 10
        stp_hold: 5
        cache_size: 1000
        cache_timeout: 600
        edge_interfaces: 'lan'
        auto_edge_interfaces: 'opt1'
        ptp_interfaces: 'lan'
        auto_ptp_interfaces: 'opt1'
        static_interfaces: 'lan'
        private_interfaces: 'opt1'
      register: opn5
      failed_when: >
        opn5.failed or
        opn5.changed
      when: not ansible_check_mode

    - name: Removing 2
      ansibleguy.opnsense.interface_bridge:
        description: 'ANSIBLE_TEST_1_2'
        state: 'absent'
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn7
      failed_when: >
        'data' not in opn7 or
        opn7.data | length != 1
      when: not ansible_check_mode

    - name: Cleanup
      ansibleguy.opnsense.interface_bridge:
        description: '{{ item }}'
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_1_1'
        - 'ANSIBLE_TEST_1_2'
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_clean1
      failed_when: >
        'data' not in opn_clean1 or
        opn_clean1.data | length != 0
      when: not ansible_check_mode
