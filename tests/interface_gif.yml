---

- name: Testing GIF interfaces
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'interface_gif'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        'data' not in opn_pre1 or
        opn_pre1.data | length != 0

    - name: Removing - does not exist
      oxlorg.opnsense.interface_gif:
        description: 'ANSIBLE_TEST_1_1'
        state: 'absent'
      register: opn_pre2
      failed_when: >
        opn_pre2.failed or
        opn_pre2.changed

    - name: Adding 1 - failing because of invalid tunnel_remote_net
      oxlorg.opnsense.interface_gif:
        description: 'ANSIBLE_TEST_1_1'
        local_addr: 'lan'
        remote_addr: '192.168.100.1'
        tunnel_local_addr: '10.0.0.1'
        tunnel_remote_addr: '10.0.0.2'
        tunnel_remote_net: 300
      register: opn_fail1
      failed_when: not opn_fail1.failed or 'tunnel_remote_net' not in opn_fail1.msg
      when: not ansible_check_mode

    - name: Adding 1
      oxlorg.opnsense.interface_gif:
        description: 'ANSIBLE_TEST_1_1'
        local_addr: 'lan'
        remote_addr: '192.168.100.1'
        tunnel_local_addr: '10.0.0.1'
        tunnel_remote_addr: '10.0.0.2'
        tunnel_remote_net: 30
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Adding 2
      oxlorg.opnsense.interface_gif:
        description: 'ANSIBLE_TEST_1_2'
        local_addr: '192.168.1.100'
        remote_addr: '192.168.100.1'
        tunnel_local_addr: '10.0.0.1'
        tunnel_remote_addr: '10.0.0.2'
        tunnel_remote_net: 30
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Adding 2 - changing
      oxlorg.opnsense.interface_gif:
        description: 'ANSIBLE_TEST_1_2'
        local_addr: '192.168.1.100'
        remote_addr: '192.168.100.1'
        tunnel_local_addr: '10.0.0.5'
        tunnel_remote_addr: '10.0.0.6'
        tunnel_remote_net: 30
        ingress_filtering: false
        ecn_friendly: true
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed
      when: not ansible_check_mode

    - name: Adding 2 - nothing changed
      oxlorg.opnsense.interface_gif:
        description: 'ANSIBLE_TEST_1_2'
        local_addr: '192.168.1.100'
        remote_addr: '192.168.100.1'
        tunnel_local_addr: '10.0.0.5'
        tunnel_remote_addr: '10.0.0.6'
        tunnel_remote_net: 30
        ingress_filtering: false
        ecn_friendly: true
      register: opn4
      failed_when: >
        opn4.failed or
        opn4.changed
      when: not ansible_check_mode

    - name: Removing 2
      oxlorg.opnsense.interface_gif:
        description: 'ANSIBLE_TEST_1_2'
        state: 'absent'
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn6
      failed_when: >
        'data' not in opn6 or
        opn6.data | length != 1
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.interface_gif:
        description: "{{ item }}"
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_1_1'
        - 'ANSIBLE_TEST_1_2'
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn_clean1
      failed_when: >
        'data' not in opn_clean1 or
        opn_clean1.data | length != 0
      when: not ansible_check_mode
