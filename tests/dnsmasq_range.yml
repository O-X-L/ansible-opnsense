---

- name: Testing dnsmasq range
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'dnsmasq_range'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        'data' not in opn_pre1 or
        opn_pre1.data | length != 0

    - name: Removing - does not exist
      oxlorg.opnsense.dnsmasq_range:
        description: ANSIBLE_TEST_1_1
        state: 'absent'
      register: opn_pre2
      failed_when: >
        opn_pre2.failed or
        opn_pre2.changed

    - name: Adding 1
      oxlorg.opnsense.dnsmasq_range:
        description: 'ANSIBLE_TEST_1_1'
        interface: 'TEST'
        start_addr: '192.168.1.100'
        end_addr: '192.168.1.150'
        subnet_mask: '255.255.255.0'
        domain_type: 'interface'
        domain: 'opn.dnsmasq'
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing 1
      oxlorg.opnsense.dnsmasq_range:
        description: 'ANSIBLE_TEST_1_1'
        interface: 'TEST'
        start_addr: '192.168.1.100'
        end_addr: '192.168.1.200'
        subnet_mask: '255.255.255.0'
        domain_type: 'interface'
        domain: 'dnsmasq.opn'
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Adding 2
      oxlorg.opnsense.dnsmasq_range:
        description: 'ANSIBLE_TEST_1_2'
        interface: 'TEST'
        start_addr: '::1'
        end_addr: '::200'
        constructor: 'TEST'
        domain_type: 'interface'
        domain: 'dnsmasq.opn'
        ra_mode:
          - 'ra-stateless'
          - 'ra-names'
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed

    - name: Adding 2 - nothing changed
      oxlorg.opnsense.dnsmasq_range:
        description: 'ANSIBLE_TEST_1_2'
        interface: 'TEST'
        start_addr: '::1'
        end_addr: '::200'
        constructor: 'TEST'
        domain_type: 'interface'
        domain: 'dnsmasq.opn'
        ra_mode:
          - 'ra-stateless'
          - 'ra-names'
      register: opn4
      failed_when: >
        opn4.failed or
        opn4.changed
      when: not ansible_check_mode

    - name: Removing 2
      oxlorg.opnsense.dnsmasq_range:
        description: 'ANSIBLE_TEST_1_2'
        state: 'absent'
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn6
      failed_when: >
        'data' not in opn6 or
        opn6.data | length != 1
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.dnsmasq_range:
        description: '{{ item }}'
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_1_1'
        - 'ANSIBLE_TEST_1_2'
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn_clean1
      failed_when: >
        'data' not in opn_clean1 or
        opn_clean1.data | length != 0
      when: not ansible_check_mode
