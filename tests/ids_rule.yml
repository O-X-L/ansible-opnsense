---

- name: Testing IDS Rule
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'ids_rule'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        opn_pre1.failed or
        'data' not in opn_pre1

    - name: Adding 1 - failing because of non-existing rule
      oxlorg.opnsense.ids_rule:
        sid: 13374206969
        enabled: true
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Changing 1
      oxlorg.opnsense.ids_rule:
        sid: 2400000
        action: 'drop'

    - name: Disabling 1
      oxlorg.opnsense.ids_rule:
        sid: 2400000
        action: 'drop'
        enabled: false
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed
      when: not ansible_check_mode

    - name: Disabling 1 - nothing changed
      oxlorg.opnsense.ids_rule:
        sid: 2400000
        action: 'drop'
        enabled: false
      register: opn3
      failed_when: >
        opn3.failed or
        opn3.changed
      when: not ansible_check_mode

    - name: Enabling 1
      oxlorg.opnsense.ids_rule:
        sid: 2400000
        action: 'drop'
        enabled: true
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed
      when: not ansible_check_mode

    - name: Enabling 1 - nothing changed
      oxlorg.opnsense.ids_rule:
        sid: 2400000
        action: 'drop'
      register: opn5
      failed_when: >
        opn5.failed or
        opn5.changed
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.ids_rule:
        sid: 2400000
      when: not ansible_check_mode
