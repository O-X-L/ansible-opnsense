---

- name: Testing Packages
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_CREDS_FILE') }}"
      ssl_verify: false

    oxlorg.opnsense.package:
      timeout: 120

    oxlorg.opnsense.list:
      target: 'package'

  vars:
    test_app1: 'os-hw-probe'
    test_app2: 'os-dmidecode'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn10
      failed_when: "'data' not in opn10"

    - name: Installing - exists
      oxlorg.opnsense.package:
        name: 'os-squid'
        action: 'install'
      register: opn1
      failed_when: >
        opn1.failed or
        opn1.changed

    - name: Removing - does not exist
      oxlorg.opnsense.package:
        name: "{{ test_app1 }}"
        action: 'remove'
      register: opn2
      failed_when: >
        opn2.failed or
        opn2.changed

    - name: Installing
      oxlorg.opnsense.package:
        name: "{{ test_app1 }}"
        action: 'install'
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed

    - name: Installing multiple
      oxlorg.opnsense.package:
        name: ["{{ test_app1 }}", "{{ test_app2 }}"]
        action: 'install'
      register: opn9
      failed_when: >
        opn9.failed or
        not opn9.changed

    - name: Waiting for backend-data to refresh
      ansible.builtin.pause:
        seconds: 5
      when: not ansible_check_mode

    - name: Checking if installed
      oxlorg.opnsense.list:
      register: opn12
      failed_when: >
        opn12.failed or
        test_app1 not in opn12.data | map(attribute='name') or
        test_app2 not in opn12.data | map(attribute='name')
      when: not ansible_check_mode

    - name: Locking
      oxlorg.opnsense.package:
        name: "{{ test_app1 }}"
        action: 'lock'
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed
      when: not ansible_check_mode

    - name: Removing - locked
      oxlorg.opnsense.package:
        name: "{{ test_app1 }}"
        action: 'remove'
      register: opn5
      failed_when: not opn5.failed
      when: not ansible_check_mode

    - name: Unlocking
      oxlorg.opnsense.package:
        name: "{{ test_app1 }}"
        action: 'unlock'
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed
      when: not ansible_check_mode

    - name: Reinstall
      oxlorg.opnsense.package:
        name: "{{ test_app1 }}"
        action: 'reinstall'
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed
      when: not ansible_check_mode

    - name: Removing multiple
      oxlorg.opnsense.package:
        name: ["{{ test_app1 }}", "{{ test_app2 }}"]
        action: 'remove'
      register: opn8
      failed_when: >
        opn8.failed or
        not opn8.changed
      when: not ansible_check_mode

    - name: Checking if removed
      oxlorg.opnsense.list:
      register: opn11
      failed_when: >
        opn11.failed or
        test_app1 in opn11.data | map(attribute='name') or
        test_app2 in opn11.data | map(attribute='name')
      when: not ansible_check_mode
