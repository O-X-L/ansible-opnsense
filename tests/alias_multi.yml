---

- name: Testing Multiple Aliases
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_CREDS_FILE') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'alias'

    oxlorg.opnsense.alias_multi:
      multi_control:
        fail_verify: true
        fail_process: true

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Fail required args (1)
      oxlorg.opnsense.alias_multi:
      register: opn8
      failed_when: not opn8.failed

    - name: Removing - do not exist
      oxlorg.opnsense.alias_multi:
        aliases:
          - name: 'ANSIBLE_TEST_2_1'
          - name: 'ANSIBLE_TEST_2_2'
          - name: 'ANSIBLE_TEST_2_3'
          - name: 'ANSIBLE_TEST_2_4'
          - name: 'ANSIBLE_TEST_2_5'
          - name: 'ANSIBLE_TEST_2_6'
          - name: 'ANSIBLE_TEST_2_7'
          - name: 'ANSIBLE_TEST_2_8'
          - name: 'ANSIBLE_TEST_2_9'
          - name: 'ANSIBLE_TEST_2_10'
          - name: 'ANSIBLE_TEST_2_11'
          - name: 'ANSIBLE_TEST_2_12'
          - name: 'ANSIBLE_TEST_2_13'
          - name: 'ANSIBLE_TEST_2_14'
        multi_control:
          state: 'absent'
      register: opn1
      failed_when: >
        opn1.failed or
        opn1.changed

    - name: Adding
      oxlorg.opnsense.alias_multi:
        aliases:
          # hosts
          - name: 'ANSIBLE_TEST_2_1'
            content: '192.168.1.1'
          - name: 'ANSIBLE_TEST_2_2'
            content: ['192.168.1.1', '192.168.1.2']

          # networks
          - name: 'ANSIBLE_TEST_2_3'
            type: 'network'
            content: '192.168.1.0/24'
          - name: 'ANSIBLE_TEST_2_4'
            type: 'network'
            content: ['192.168.1.0/24', '192.168.2.0/24']

          # ports
          - name: 'ANSIBLE_TEST_2_5'
            type: 'port'
            content: 80
          - name: 'ANSIBLE_TEST_2_6'
            type: 'port'
            content: [80, 443]

          # urls
          - name: 'ANSIBLE_TEST_2_7'
            type: 'url'
            content: 'http://test.oxlorg.net'

          # urltables
          - name: 'ANSIBLE_TEST_2_8'
            type: 'urltable'
            content: ['https://www.spamhaus.org/drop/drop.txt']
            updatefreq_days: 6.5

          # geoip
          - name: 'ANSIBLE_TEST_2_9'
            type: 'geoip'
            content: 'AT'
          - name: 'ANSIBLE_TEST_2_10'
            type: 'geoip'
            content: ['AT', 'DE', 'CH']

          # dynipv6host
          - name: 'ANSIBLE_TEST_2_11'
            type: 'dynipv6host'
            content:
              - '::f00d'
            interface: 'lan'

        reload: false  # geoip and urltable take LONG time
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Changing
      oxlorg.opnsense.alias_multi:
        aliases:
          - name: 'ANSIBLE_TEST_2_2'
            content: ['192.168.1.1', '192.168.1.3']

          - name: 'ANSIBLE_TEST_2_3'
            type: 'network'
            content: '192.168.10.0/24'

          - name: 'ANSIBLE_TEST_2_5'
            type: 'port'
            content: 81

          - name: 'ANSIBLE_TEST_2_7'
            type: 'url'
            content: 'http://test.template.oxlorg.net'

          - name: 'ANSIBLE_TEST_2_8'
            type: 'urltable'
            content: 'https://www.spamhaus.org/drop/dropv6.txt'
            updatefreq_days: 2

          - name: 'ANSIBLE_TEST_2_9'
            type: 'geoip'
            content: 'DE'

          - name: 'ANSIBLE_TEST_2_11'
            type: 'dynipv6host'
            content:
              - '::1000'
              - '::f00d'
            interface: 'lan'
        reload: false  # geoip and urltable take LONG time
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed
      when: not ansible_check_mode

    - name: Nothing changed
      oxlorg.opnsense.alias_multi:
        aliases:
          - name: 'ANSIBLE_TEST_2_2'
            content: ['192.168.1.1', '192.168.1.3']

          - name: 'ANSIBLE_TEST_2_3'
            type: 'network'
            content: '192.168.10.0/24'

          - name: 'ANSIBLE_TEST_2_5'
            type: 'port'
            content: 81

          - name: 'ANSIBLE_TEST_2_7'
            type: 'url'
            content: 'http://test.template.oxlorg.net'

          - name: 'ANSIBLE_TEST_2_8'
            type: 'urltable'
            updatefreq_days: 2
            content: 'https://www.spamhaus.org/drop/dropv6.txt'

          - name: 'ANSIBLE_TEST_2_9'
            type: 'geoip'
            content: 'DE'

          - name: 'ANSIBLE_TEST_2_11'
            type: 'dynipv6host'
            content:
              - '::1000'
              - '::f00d'
            interface: 'lan'
        reload: false  # geoip and urltable take LONG time
      register: opn6
      failed_when: >
        opn6.failed or
        opn6.changed
      when: not ansible_check_mode

    - name: Adding nested aliases
      oxlorg.opnsense.alias_multi:
        aliases:
          # hosts
          - name: 'ANSIBLE_TEST_2_12'
            content: ['ANSIBLE_TEST_2_1', 'ANSIBLE_TEST_2_2']

          # networks
          - name: 'ANSIBLE_TEST_2_13'
            type: 'network'
            content: ['ANSIBLE_TEST_2_3', 'ANSIBLE_TEST_2_4']

          # ports
          - name: 'ANSIBLE_TEST_2_14'
            type: 'port'
            content: ['ANSIBLE_TEST_2_5', 'ANSIBLE_TEST_2_6']

        reload: false  # geoip and urltable take LONG time
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed
      when: not ansible_check_mode

    - name: Listing aliases
      oxlorg.opnsense.list:
      register: opn4
      failed_when: >
        'data' not in opn4 or
        opn4.data | length != 14
      when: not ansible_check_mode

    - name: Removing nesting
      oxlorg.opnsense.alias_multi:
        aliases:
          - name: 'ANSIBLE_TEST_2_12'
          - name: 'ANSIBLE_TEST_2_13'
          - name: 'ANSIBLE_TEST_2_14'
        multi_control:
          state: 'absent'
      when: not ansible_check_mode

    - name: Removing
      oxlorg.opnsense.alias_multi:
        aliases:
          - name: 'ANSIBLE_TEST_2_1'
          - name: 'ANSIBLE_TEST_2_2'
          - name: 'ANSIBLE_TEST_2_3'
          - name: 'ANSIBLE_TEST_2_4'
          - name: 'ANSIBLE_TEST_2_5'
          - name: 'ANSIBLE_TEST_2_6'
          - name: 'ANSIBLE_TEST_2_7'
          - name: 'ANSIBLE_TEST_2_8'
          - name: 'ANSIBLE_TEST_2_9'
          - name: 'ANSIBLE_TEST_2_10'
          - name: 'ANSIBLE_TEST_2_11'
        multi_control:
          state: 'absent'

    - name: Checking cleanup
      oxlorg.opnsense.list:
      register: opn5
      failed_when: >
        'data' not in opn5 or
        opn5.data | length != 0
      when: not ansible_check_mode
