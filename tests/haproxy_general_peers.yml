---

- name: Testing HAProxy general peers settings
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/ansibleguy.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    ansibleguy.opnsense.list:
      target: 'haproxy_general_peers'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_pre1
      failed_when: >
        opn_pre1.failed or
        'data' not in opn_pre1

    - name: Configuring - failing because of invalid port
      ansibleguy.opnsense.haproxy_general_peers:
        port1: 70000
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Configuring basic peers settings
      ansibleguy.opnsense.haproxy_general_peers:
        enabled: true
        name1: 'haproxy-primary.example.com'
        listen1: '192.168.1.10'
        port1: 9999
        name2: 'haproxy-secondary.example.com'
        listen2: '192.168.1.11'
        port2: 9999
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing peers settings
      ansibleguy.opnsense.haproxy_general_peers:
        enabled: true
        name1: 'haproxy-node1.example.com'
        listen1: '10.0.0.10'
        port1: 10000
        name2: 'haproxy-node2.example.com'
        listen2: '10.0.0.11'
        port2: 10000
      register: opn9
      failed_when: >
        opn9.failed or
        not opn9.changed

    - name: Disabling HAProxy peers
      ansibleguy.opnsense.haproxy_general_peers:
        enabled: false
        name1: 'haproxy-node1.example.com'
        listen1: '10.0.0.10'
        port1: 10000
        name2: 'haproxy-node2.example.com'
        listen2: '10.0.0.11'
        port2: 10000
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed
      when: not ansible_check_mode

    - name: Disabling HAProxy peers - nothing changed
      ansibleguy.opnsense.haproxy_general_peers:
        enabled: false
        name1: 'haproxy-node1.example.com'
        listen1: '10.0.0.10'
        port1: 10000
        name2: 'haproxy-node2.example.com'
        listen2: '10.0.0.11'
        port2: 10000
      register: opn3
      failed_when: >
        opn3.failed or
        opn3.changed
      when: not ansible_check_mode

    - name: Enabling HAProxy peers
      ansibleguy.opnsense.haproxy_general_peers:
        enabled: true
        name1: 'haproxy-node1.example.com'
        listen1: '10.0.0.10'
        port1: 10000
        name2: 'haproxy-node2.example.com'
        listen2: '10.0.0.11'
        port2: 10000
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed
      when: not ansible_check_mode

    - name: Testing single peer configuration
      ansibleguy.opnsense.haproxy_general_peers:
        enabled: true
        name1: 'haproxy-standalone.example.com'
        listen1: '127.0.0.1'
        port1: 1024
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Nothing changed
      ansibleguy.opnsense.haproxy_general_peers:
        enabled: true
        name1: 'haproxy-standalone.example.com'
        listen1: '127.0.0.1'
        port1: 1024
      register: opn6
      failed_when: >
        opn6.failed or
        opn6.changed
      when: not ansible_check_mode

    - name: Cleanup
      ansibleguy.opnsense.haproxy_general_peers:
        enabled: false
        port1: 1024
        port2: 1024
      when: not ansible_check_mode
