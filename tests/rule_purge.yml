---

- name: Testing Purging of Rules
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'rule'

    oxlorg.opnsense.rule_multi:
      match_fields: ['description']
      multi_control:
        fail_verify: true
        fail_process: true

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Purge ALL
      oxlorg.opnsense.rule_multi:
        multi_control:
          purge_all: true

    - name: Adding 1
      oxlorg.opnsense.rule_multi:
        rules:
          - name: 'ANSIBLE_TEST_3_1'
            source_net: '192.168.1.0/24'
            destination_invert: true
            destination_net: '10.0.0.0/8'
            action: 'block'
          - name: 'ANSIBLE_TEST_3_2'
            source_net: '192.168.0.0/24'
            destination_net: '192.168.10.0/24'
            destination_port: 443
            protocol: 'TCP'
            interface: 'lan'
          - name: 'ANSIBLE_TEST_3_3'
            source_invert: true
            source_net: 'bogons'
            action: 'block'
      when: not ansible_check_mode

    - name: Filtered purge (single)
      oxlorg.opnsense.rule_multi:
        multi_control:
          purge_filter:
            destination_net: '192.168.10.0/24'
          purge_action: 'disable'
      when: not ansible_check_mode
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Simple disable-purge
      oxlorg.opnsense.rule_multi:
        multi_purge:
          - name: 'ANSIBLE_TEST_3_1'
        multi_control:
          purge_action: 'disable'
      register: opn2
      when: not ansible_check_mode
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Simple purge
      oxlorg.opnsense.rule_multi:
        multi_purge:
          - name: 'ANSIBLE_TEST_3_1'
      when: not ansible_check_mode
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed

    - name: Listing rules
      oxlorg.opnsense.list:
      register: opn4
      failed_when: >
        'data' not in opn4 or
        opn4.data | length != 2
      when: not ansible_check_mode

    - name: Adding 2
      oxlorg.opnsense.rule_multi:
        rules:
          - name: 'ANSIBLE_TEST_3_1'
            source_net: '192.168.1.0/24'
            destination_invert: true
            destination_net: '192.168.10.0/24'
            action: 'block'
          - name: 'ANSIBLE_TEST_3_2'
            source_net: '192.168.0.0/24'
            destination_net: '192.168.10.0/24'
            destination_port: 443
            protocol: 'TCP'
            interface: 'lan'
          - name: 'ANSIBLE_TEST_3_3'
            source_invert: true
            source_net: 'bogons'
            action: 'block'
      when: not ansible_check_mode

    - name: Filtered purge (single)
      oxlorg.opnsense.rule_multi:
        multi_control:
          purge_filter:
            destination_net: '192.168.10.0/24'
      when: not ansible_check_mode
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Listing rules
      oxlorg.opnsense.list:
      register: opn5
      failed_when: >
        'data' not in opn5 or
        opn5.data | length != 1
      when: not ansible_check_mode

    - name: Adding 3
      oxlorg.opnsense.rule_multi:
        rules:
          - name: 'ANSIBLE_TEST_3_1'
            source_net: '192.168.1.0/24'
            destination_invert: true
            destination_net: '192.168.10.0/24'
            action: 'block'
          - name: 'ANSIBLE_TEST_3_2'
            source_net: '192.168.0.0/24'
            destination_net: '192.168.10.0/24'
            destination_port: 443
            protocol: 'TCP'
            interface: 'lan'
          - name: 'ANSIBLE_TEST_3_3'
            source_invert: true
            source_net: 'bogons'
            action: 'block'
      when: not ansible_check_mode

    - name: Filtered purge (single inverted)
      oxlorg.opnsense.rule_multi:
        multi_control:
          purge_filter:
            destination_net: '192.168.10.0/24'
          purge_filter_invert: true
      when: not ansible_check_mode
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed

    - name: Listing rules
      oxlorg.opnsense.list:
      register: opn7
      failed_when: >
        'data' not in opn7 or
        opn7.data | length != 2
      when: not ansible_check_mode

    - name: Adding 4
      oxlorg.opnsense.rule_multi:
        rules:
          - name: 'ANSIBLE_TEST_3_1'
            source_net: '192.168.1.0/24'
            destination_invert: true
            destination_net: '192.168.10.0/24'
            action: 'block'

          - name: 'ANSIBLE_TEST_3_2'
            source_net: '192.168.0.0/24'
            destination_net: '192.168.10.0/24'
            destination_port: 443
            protocol: 'TCP'
            interface: 'lan'
            action: 'pass'

          - name: 'ANSIBLE_TEST_3_3'
            source_invert: true
            source_net: 'bogons'
            action: 'block'
      when: not ansible_check_mode
      register: opn8
      failed_when: >
        opn8.failed or
        not opn8.changed

    - name: Filtered purge (multiple)
      oxlorg.opnsense.rule_multi:
        multi_control:
          purge_filter:
            ip_protocol: 'inet'
            action: 'block'
      when: not ansible_check_mode
      register: opn8
      failed_when: >
        opn8.failed or
        not opn8.changed

    - name: Listing rules
      oxlorg.opnsense.list:
      register: opn9
      failed_when: >
        'data' not in opn9 or
        opn9.data | length != 1
      when: not ansible_check_mode

    - name: Purge ALL
      oxlorg.opnsense.rule_multi:
        multi_control:
          purge_all: true
      when: not ansible_check_mode
      register: opn10
      failed_when: >
        opn10.failed or
        not opn10.changed

    - name: Checking cleanup
      oxlorg.opnsense.list:
      register: opn11
      failed_when: >
        'data' not in opn11 or
        opn11.data | length != 0
      when: not ansible_check_mode
