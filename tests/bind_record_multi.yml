---

- name: Testing BIND Multi-Records
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/ansibleguy.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    ansibleguy.opnsense.list:
      target: 'bind_record'

    ansibleguy.opnsense.bind_record:
      multi_control:
        fail_verify: true
        fail_process: true

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:


    - name: Adding dummy domain
      ansibleguy.opnsense.bind_domain:
        name: 'test4.ansibleguy'
      when: not ansible_check_mode

    - name: Adding 1
      ansibleguy.opnsense.bind_record:
        records:
          - name: 'test1'
            domain: 'test4.ansibleguy'
            value: '192.168.1.1'
            type: 'A'

          - name: 'test1'
            domain: 'test4.ansibleguy'
            type: 'TXT'
            value: 'random'

          - name: 'test2'
            domain: 'test4.ansibleguy'
            value: '192.168.2.1'

          - name: 'test3'
            domain: 'test4.ansibleguy'
            value: '192.168.3.1'

          - name: 'test4'
            domain: 'test4.ansibleguy'
            type: 'CNAME'
            value: 'test1.test3.ansibleguy'

          - name: 'test5'
            domain: 'test4.ansibleguy'
            type: 'AAAA'
            value: '2001:db8::1'
            round_robin: true

          - name: 'test5'
            domain: 'test4.ansibleguy'
            type: 'AAAA'
            value: '2001:db8::2'
            round_robin: true
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn12
      failed_when: >
        'data' not in opn12 or
        opn12.data | length != 7
      when: not ansible_check_mode

    - name: Removing single
      ansibleguy.opnsense.bind_record:
        records:
          - name: 'test1'
            domain: 'test4.ansibleguy'
            value: '192.168.1.2'
            type: 'A'

          - name: 'test1'
            domain: 'test4.ansibleguy'
            type: 'TXT'
            value: 'random_new'

          - name: 'test2'
            domain: 'test4.ansibleguy'
            value: '192.168.2.1'
            enabled: false

          - name: 'test3'
            domain: 'test4.ansibleguy'
            state: 'absent'

          - name: 'test4'
            domain: 'test4.ansibleguy'
            type: 'CNAME'
            value: 'test2.test3.ansibleguy'
          # round-robin

          - name: 'test5'
            domain: 'test4.ansibleguy'
            type: 'AAAA'
            value: '2001:db8::1'
            round_robin: true

          - name: 'test5'
            domain: 'test4.ansibleguy'
            type: 'AAAA'
            value: '2001:db8::2'
            round_robin: true
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed
      when: not ansible_check_mode

    - name: Nothing changed
      ansibleguy.opnsense.bind_record:
        records:
          - name: 'test1'
            domain: 'test4.ansibleguy'
            value: '192.168.1.2'
            type: 'A'

          - name: 'test1'
            domain: 'test4.ansibleguy'
            type: 'TXT'
            value: 'random_new'

          - name: 'test2'
            domain: 'test4.ansibleguy'
            value: '192.168.2.1'
            enabled: false

          - name: 'test3'
            domain: 'test4.ansibleguy'
            state: 'absent'

          - name: 'test4'
            domain: 'test4.ansibleguy'
            type: 'CNAME'
            value: 'test2.test3.ansibleguy'
          # round-robin

          - name: 'test5'
            domain: 'test4.ansibleguy'
            type: 'AAAA'
            value: '2001:db8::1'
            round_robin: true

          - name: 'test5'
            domain: 'test4.ansibleguy'
            type: 'AAAA'
            value: '2001:db8::2'
            round_robin: true
      register: opn3
      failed_when: >
        opn3.failed or
        opn3.changed
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn8
      failed_when: >
        'data' not in opn8 or
        opn8.data | length != 6
      when: not ansible_check_mode

    - name: Removing - round robin
      ansibleguy.opnsense.bind_record:
        records:
          - name: 'test5'
            domain: 'test4.ansibleguy'
            type: 'AAAA'
            round_robin: true

          - name: 'test5'
            domain: 'test4.ansibleguy'
            type: 'AAAA'
            round_robin: true

        multi_control:
          state: 'absent'
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn9
      failed_when: >
        'data' not in opn9 or
        opn9.data | length != 4
      when: not ansible_check_mode

    - name: Cleanup
      ansibleguy.opnsense.bind_record:
        records:
          - name: 'test1'
            domain: 'test4.ansibleguy'
            type: 'A'

          - name: 'test1'
            domain: 'test4.ansibleguy'
            type: 'TXT'

          - name: 'test2'
            domain: 'test4.ansibleguy'

          - name: 'test3'
            domain: 'test4.ansibleguy'

          - name: 'test4'
            domain: 'test4.ansibleguy'
            type: 'CNAME'

        multi_control:
          state: 'absent'
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_clean2
      failed_when: >
        'data' not in opn_clean2 or
        opn_clean2.data | length != 0
      when: not ansible_check_mode

    - name: Adding 2
      ansibleguy.opnsense.bind_record:
        records:
          - name: 'test1'
            domain: 'test4.ansibleguy'
            value: '192.168.1.1'
      register: opn11
      failed_when: >
        opn11.failed or
        not opn11.changed
      when: not ansible_check_mode

    - name: Purging all
      ansibleguy.opnsense.bind_record:
        multi_control:
          purge_all: true
      register: opn10
      failed_when: >
        opn10.failed or
        not opn10.changed
      when: not ansible_check_mode

    - name: Cleanup domain
      ansibleguy.opnsense.bind_domain:
        name: 'test4.ansibleguy'
        state: 'absent'
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_clean1
      failed_when: >
        'data' not in opn_clean1 or
        opn_clean1.data | length != 0
      when: not ansible_check_mode
