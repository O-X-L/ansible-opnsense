---

- name: Using credential-file
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_CREDS_FILE') }}"
      ssl_verify: false

    oxlorg.opnsense.package:
      timeout: 120

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Query System-Info
      oxlorg.opnsense.raw:
        url: 'core/firmware/info'
      register: system_info
      failed_when:
        system_info.failed or
        'response' not in system_info or
        'product_version' not in system_info.response

- name: Using api-key & api-secret
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_key: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      api_secret: "{{ lookup('ansible.builtin.env', 'TEST_API_SECRET') }}"
      ssl_verify: false

    oxlorg.opnsense.package:
      timeout: 120

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Query System-Info
      oxlorg.opnsense.raw:
        url: 'core/firmware/info'
      register: system_info
      failed_when:
        system_info.failed or
        'response' not in system_info or
        'product_version' not in system_info.response
