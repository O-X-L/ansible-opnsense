---

- name: Testing HAProxy general settings
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'haproxy_general_settings'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        opn_pre1.failed or
        'data' not in opn_pre1

    - name: Configuring - failing because of invalid hard_stop_after
      oxlorg.opnsense.haproxy_general_settings:
        hard_stop_after: 100000
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Configuring - failing because of invalid close_spread_time
      oxlorg.opnsense.haproxy_general_settings:
        close_spread_time: 5000
      register: opn_fail2
      failed_when: not opn_fail2.failed

    - name: Configuring basic settings
      oxlorg.opnsense.haproxy_general_settings:
        enabled: true
        graceful_stop: true
        hard_stop_after: 60
        close_spread_time: 30
        seamless_reload: true
        show_intro: false
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing settings
      oxlorg.opnsense.haproxy_general_settings:
        enabled: true
        graceful_stop: false
        hard_stop_after: 120
        close_spread_time: 60
        seamless_reload: false
        show_intro: true
      register: opn9
      failed_when: >
        opn9.failed or
        not opn9.changed

    - name: Disabling HAProxy
      oxlorg.opnsense.haproxy_general_settings:
        enabled: false
        graceful_stop: false
        hard_stop_after: 120
        close_spread_time: 60
        seamless_reload: false
        show_intro: true
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed
      when: not ansible_check_mode

    - name: Disabling HAProxy - nothing changed
      oxlorg.opnsense.haproxy_general_settings:
        enabled: false
        graceful_stop: false
        hard_stop_after: 120
        close_spread_time: 60
        seamless_reload: false
        show_intro: true
      register: opn3
      failed_when: >
        opn3.failed or
        opn3.changed
      when: not ansible_check_mode

    - name: Enabling HAProxy
      oxlorg.opnsense.haproxy_general_settings:
        enabled: true
        graceful_stop: false
        hard_stop_after: 120
        close_spread_time: 60
        seamless_reload: false
        show_intro: true
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed
      when: not ansible_check_mode

    - name: Testing edge values
      oxlorg.opnsense.haproxy_general_settings:
        enabled: true
        graceful_stop: true
        hard_stop_after: 0
        close_spread_time: 0
        seamless_reload: true
        show_intro: false
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Nothing changed
      oxlorg.opnsense.haproxy_general_settings:
        enabled: true
        graceful_stop: true
        hard_stop_after: 0
        close_spread_time: 0
        seamless_reload: true
        show_intro: false
      register: opn6
      failed_when: >
        opn6.failed or
        opn6.changed
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.haproxy_general_settings:
        enabled: false
        graceful_stop: true
        seamless_reload: false
        show_intro: true
      when: not ansible_check_mode
