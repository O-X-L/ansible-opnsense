---

- name: WebProxy Forward-ICAP Settings
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_CREDS_FILE') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'webproxy_icap'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        opn_pre1.failed or
        'data' not in opn_pre1

    - name: Configuring - failing because of invalid user-header
      oxlorg.opnsense.webproxy_parent:
        header_username: '!INVALID-'
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Configuring
      oxlorg.opnsense.webproxy_icap:
        response_url: 'icap://av.lan:1344/avscan'
        ttl: 70
        send_username: true
        send_client_ip: true
        encode_username: true
        preview_size: 3072
        exclude: ['oxlorg.net']
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing 1
      oxlorg.opnsense.webproxy_icap:
        response_url: 'icap://av.lan:1345/avscan'
        ttl: 50
        send_username: false
        send_client_ip: true
        encode_username: true
        preview_size: 2048
        exclude: ['oxlorg.net', 'random.site']
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed
      when: not ansible_check_mode

    - name: Changing 1 - nothing changed
      oxlorg.opnsense.webproxy_icap:
        response_url: 'icap://av.lan:1345/avscan'
        ttl: 50
        send_username: false
        send_client_ip: true
        encode_username: true
        preview_size: 2048
        exclude: ['oxlorg.net', 'random.site']
      register: opn3
      failed_when: >
        opn3.failed or
        opn3.changed
      when: not ansible_check_mode

    - name: Disabling 1
      oxlorg.opnsense.webproxy_icap:
        response_url: 'icap://av.lan:1345/avscan'
        ttl: 50
        send_username: false
        send_client_ip: true
        encode_username: true
        preview_size: 2048
        exclude: ['oxlorg.net', 'random.site']
        enabled: false
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed
      when: not ansible_check_mode

    - name: Disabling 1 - nothing changed
      oxlorg.opnsense.webproxy_icap:
        response_url: 'icap://av.lan:1345/avscan'
        ttl: 50
        send_username: false
        send_client_ip: true
        encode_username: true
        preview_size: 2048
        exclude: ['oxlorg.net', 'random.site']
        enabled: false
      register: opn4
      failed_when: >
        opn4.failed or
        opn4.changed
      when: not ansible_check_mode

    - name: Enabling 1
      oxlorg.opnsense.webproxy_icap:
        response_url: 'icap://av.lan:1345/avscan'
        ttl: 50
        send_username: false
        send_client_ip: true
        encode_username: true
        preview_size: 2048
        exclude: ['oxlorg.net', 'random.site']
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.webproxy_icap:
        enabled: false
      when: not ansible_check_mode
