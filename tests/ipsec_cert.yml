  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn2
      failed_when: >
        'data' not in opn2 or
        opn2.data | length != 0

    - name: Removing - does not exist
      oxlorg.opnsense.ipsec_cert:
        name: 'ANSIBLE_TEST_1_1'
        state: 'absent'
      register: opn1
      failed_when: >
        opn1.failed or
        opn1.changed

    - name: Validation - failing because of invalid pub-key
      oxlorg.opnsense.ipsec_cert:
        name: 'ANSIBLE_TEST_1_1'
        public_key: 'not-a-pubkey'
        private_key: "{{ test1.priv }}"
      register: opn3
      failed_when: not opn3.failed

    - name: Validation - failing because of invalid priv-key
      oxlorg.opnsense.ipsec_cert:
        name: 'ANSIBLE_TEST_1_1'
        public_key: "{{ test1.pub }}"
        private_key: 'not-a-privkey'
      register: opn4
      failed_when: not opn4.failed

    - name: Validation - failing because of key-mismatch (server-side)
      oxlorg.opnsense.ipsec_cert:
        name: 'ANSIBLE_TEST_1_1'
        public_key: "{{ test2_mismatch.pub }}"
        private_key: "{{ test2.priv }}"
      register: opn5
      failed_when: not opn5.failed
      when: not ansible_check_mode

    - name: Adding 1
      oxlorg.opnsense.ipsec_cert:
        name: 'ANSIBLE_TEST_1_1'
        public_key: "{{ test1.pub }}"
        private_key: "{{ test1.priv }}"
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed

    - name: Adding 1 - nothing changed
      oxlorg.opnsense.ipsec_cert:
        name: 'ANSIBLE_TEST_1_1'
        public_key: "{{ test1.pub }}"
        private_key: "{{ test1.priv }}"
      register: opn9
      failed_when: >
        opn9.failed or
        opn9.changed
      when: not ansible_check_mode

    - name: Adding 2
      oxlorg.opnsense.ipsec_cert:
        name: 'ANSIBLE_TEST_1_2'
        public_key: "{{ test2.pub }}"
        private_key: "{{ test2.priv }}"
        type: ecdsa
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed

    - name: Changing 1
      oxlorg.opnsense.ipsec_cert:
        name: 'ANSIBLE_TEST_1_1'
        public_key: "{{ test2.pub }}"
        private_key: "{{ test2.priv }}"
        type: ecdsa
      register: opn8
      failed_when: >
        opn8.failed or
        not opn8.changed
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn10
      failed_when: >
        'data' not in opn10 or
        opn10.data | length != 2
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.ipsec_cert:
        name: "{{ item }}"
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_1_1'
        - 'ANSIBLE_TEST_1_2'
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn2
      failed_when: >
        'data' not in opn2 or
        opn2.data | length != 0
      when: not ansible_check_mode
