---

- name: Testing HAProxy group management
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/ansibleguy.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    ansibleguy.opnsense.list:
      target: 'haproxy_group'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_pre1
      failed_when: >
        opn_pre1.failed or
        'data' not in opn_pre1

    - name: Create test users first
      ansibleguy.opnsense.haproxy_user:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        password: "{{ item.password }}"
        enabled: true
      loop:
        - {name: 'groupuser1', description: 'Group test user 1', password: 'password1'}
        - {name: 'groupuser2', description: 'Group test user 2', password: 'password2'}
        - {name: 'groupuser3', description: 'Group test user 3', password: 'password3'}

    - name: Configuring - failing because of invalid name
      ansibleguy.opnsense.haproxy_group:
        name: ''
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Creating HAProxy group
      ansibleguy.opnsense.haproxy_group:
        name: 'testgroup1'
        description: 'Test group 1'
        members: ['groupuser1', 'groupuser2']
        add_userlist: true
        enabled: true
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Creating another HAProxy group
      ansibleguy.opnsense.haproxy_group:
        name: 'testgroup2'
        description: 'Test group 2'
        members: ['groupuser3']
        add_userlist: false
        enabled: true
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Changing group settings
      ansibleguy.opnsense.haproxy_group:
        name: 'testgroup1'
        description: 'Modified test group 1'
        members: ['groupuser1', 'groupuser2', 'groupuser3']
        add_userlist: true
        enabled: true
      register: opn9
      failed_when: >
        opn9.failed or
        not opn9.changed

    - name: Disabling HAProxy group
      ansibleguy.opnsense.haproxy_group:
        name: 'testgroup1'
        description: 'Modified test group 1'
        members: ['groupuser1', 'groupuser2', 'groupuser3']
        add_userlist: true
        enabled: false
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed
      when: not ansible_check_mode

    - name: Disabling HAProxy group - nothing changed
      ansibleguy.opnsense.haproxy_group:
        name: 'testgroup1'
        description: 'Modified test group 1'
        members: ['groupuser1', 'groupuser2', 'groupuser3']
        add_userlist: true
        enabled: false
      register: opn4
      failed_when: >
        opn4.failed or
        opn4.changed
      when: not ansible_check_mode

    - name: Enabling HAProxy group
      ansibleguy.opnsense.haproxy_group:
        name: 'testgroup1'
        description: 'Modified test group 1'
        members: ['groupuser1', 'groupuser2', 'groupuser3']
        add_userlist: true
        enabled: true
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Nothing changed
      ansibleguy.opnsense.haproxy_group:
        name: 'testgroup1'
        description: 'Modified test group 1'
        members: ['groupuser1', 'groupuser2', 'groupuser3']
        add_userlist: true
        enabled: true
      register: opn6
      failed_when: >
        opn6.failed or
        opn6.changed
      when: not ansible_check_mode

    - name: Testing empty group
      ansibleguy.opnsense.haproxy_group:
        name: 'emptygroup'
        description: 'Empty test group'
        members: []
        add_userlist: false
        enabled: true
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed
      when: not ansible_check_mode

    - name: Cleanup groups
      ansibleguy.opnsense.haproxy_group:
        name: "{{ item }}"
        state: 'absent'
      loop:
        - 'testgroup1'
        - 'testgroup2'
        - 'emptygroup'
      when: not ansible_check_mode

    - name: Cleanup test users
      ansibleguy.opnsense.haproxy_user:
        name: "{{ item }}"
        state: 'absent'
      loop:
        - 'groupuser1'
        - 'groupuser2'
        - 'groupuser3'
      when: not ansible_check_mode