---

- name: Testing One to One (BI)NAT
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/ansibleguy.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false
      # match_fields: ['description']

    ansibleguy.opnsense.list:
      target: 'one_to_one'

  tasks:
    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_pre1
      failed_when: >
        'data' not in opn_pre1 or
        opn_pre1.data | length != 0

    - name: Removing - does not exist
      ansibleguy.opnsense.one_to_one:
        description: 'DOES-NOT-EXIST'
        state: 'absent'
      register: opn_pre2
      failed_when: >
        opn_pre2.failed or
        opn_pre2.changed

    - name: Adding 1 - failing because of invalid value
      ansibleguy.opnsense.one_to_one:
        interface: 'lan'
        external: '1.2.3.4'
        source_net: '192.168.0.1'
        description: 'ANSIBLE_TEST_1_1'
        type: 'INVALID-TYPE'
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Adding 1
      ansibleguy.opnsense.one_to_one:
        interface: 'lan'
        external: '1.2.3.4'
        source_net: '192.168.0.1'
        description: 'ANSIBLE_TEST_1_1'
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing 1
      ansibleguy.opnsense.one_to_one:
        interface: 'lan'
        external: '1.2.3.4'
        source_net: '192.168.0.2'
        description: 'ANSIBLE_TEST_1_1'
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Disabling 1
      ansibleguy.opnsense.one_to_one:
        interface: 'lan'
        external: '1.2.3.4'
        source_net: '192.168.0.2'
        description: 'ANSIBLE_TEST_1_1'
        enabled: false
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed
      when: not ansible_check_mode

    - name: Disabling 1 - nothing changed
      ansibleguy.opnsense.one_to_one:
        interface: 'lan'
        external: '1.2.3.4'
        source_net: '192.168.0.2'
        description: 'ANSIBLE_TEST_1_1'
        enabled: false
      register: opn4
      failed_when: >
        opn4.failed or
        opn4.changed
      when: not ansible_check_mode

    - name: Enabling 1
      ansibleguy.opnsense.one_to_one:
        interface: 'lan'
        external: '1.2.3.4'
        source_net: '192.168.0.2'
        description: 'ANSIBLE_TEST_1_1'
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Adding 2
      ansibleguy.opnsense.one_to_one:
        interface: 'lan'
        external: '1.2.3.5'
        source_net: '192.168.0.3'
        description: 'ANSIBLE_TEST_1_2'
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed

    - name: Adding 2 - nothing changed
      ansibleguy.opnsense.one_to_one:
        interface: 'lan'
        external: '1.2.3.5'
        source_net: '192.168.0.3'
        description: 'ANSIBLE_TEST_1_2'
      register: opn7
      failed_when: >
        opn7.failed or
        opn7.changed
      when: not ansible_check_mode

    - name: Removing 2
      ansibleguy.opnsense.one_to_one:
        interface: 'lan'
        external: '1.2.3.5'
        source_net: '192.168.0.3'
        state: 'absent'
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn8
      failed_when: >
        'data' not in opn8 or
        opn8.data | length != 1
      when: not ansible_check_mode

    - name: Cleanup
      ansibleguy.opnsense.one_to_one:
        description: '{{ item }}'
        match_fields: 'description'
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_1_1'
        - 'ANSIBLE_TEST_1_2'
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_clean1
      failed_when: >
        'data' not in opn_clean1 or
        opn_clean1.data | length != 0
      when: not ansible_check_mode
