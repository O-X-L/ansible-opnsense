---

# these tests should cover the main functionality of the abstracted mass management
#   module-specific logic should be tested by dedicated test-cases (<module>_multi.yml)

# low-level checks should be done via unit-tests: module_utils/base/multi_base_pytest.py

- name: Testing Mass Management
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/ansibleguy.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    ansibleguy.opnsense.list:
      target: 'alias'

    ansibleguy.opnsense.alias:
      multi_control:
        fail_verify: true
        fail_process: true

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Purging all
      ansibleguy.opnsense.alias:
        multi_control:
          purge_all: true

    - name: Fail required args (1)
      ansibleguy.opnsense.alias:
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Fail required args (2)
      ansibleguy.opnsense.alias:
        multi_control:
          purge_action: 'disable'
      register: opn_fail2
      failed_when: not opn_fail2.failed

    - name: Fail required args (3)
      ansibleguy.opnsense.alias:
        multi_control:
          purge_filter:
            type: 'port'
      register: opn_fail3
      failed_when: not opn_fail3.failed

    - name: Removing - do not exist
      ansibleguy.opnsense.alias:
        aliases:
          - name: 'ANSIBLE_TEST_0_1'
        multi_control:
          state: 'absent'
      register: opn1
      failed_when: >
        opn1.failed or
        opn1.changed

    - name: Adding
      ansibleguy.opnsense.alias:
        aliases:
          - name: 'ANSIBLE_TEST_0_1'
            type: 'host'
            content: '192.168.1.1'

          - name: 'ANSIBLE_TEST_0_2'
            type: 'host'
            content: ['192.168.1.1', '192.168.1.2']

          - name: 'ANSIBLE_TEST_0_3'
            type: 'network'
            content: '192.168.1.0/24'

          - name: 'ANSIBLE_TEST_0_4'
            type: 'network'
            content: ['192.168.1.0/24', '192.168.2.0/24']

          - name: 'ANSIBLE_TEST_0_5'
            type: 'port'
            content: 80

          - name: 'ANSIBLE_TEST_0_6'
            type: 'port'
            content: [80, 443]
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Changing
      ansibleguy.opnsense.alias:
        aliases:
          - name: 'ANSIBLE_TEST_0_1'
            type: 'host'
            content: '192.168.2.1'

          - name: 'ANSIBLE_TEST_0_2'
            type: 'host'
            content: ['192.168.2.1', '192.168.2.2']

          - name: 'ANSIBLE_TEST_0_3'
            type: 'network'
            content: '192.168.1.0/25'

          - name: 'ANSIBLE_TEST_0_4'
            type: 'network'
            content: ['192.168.2.0/24', '192.168.20.0/23']

          - name: 'ANSIBLE_TEST_0_5'
            type: 'port'
            content: 443

          - name: 'ANSIBLE_TEST_0_6'
            type: 'port'
            content: [80, 8443]
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed
      when: not ansible_check_mode

    - name: Nothing changed
      ansibleguy.opnsense.alias:
        aliases:
          - name: 'ANSIBLE_TEST_0_1'
            type: 'host'
            content: '192.168.2.1'

          - name: 'ANSIBLE_TEST_0_2'
            type: 'host'
            content: ['192.168.2.1', '192.168.2.2']

          - name: 'ANSIBLE_TEST_0_3'
            type: 'network'
            content: '192.168.1.0/25'

          - name: 'ANSIBLE_TEST_0_4'
            type: 'network'
            content: ['192.168.2.0/24', '192.168.20.0/23']

          - name: 'ANSIBLE_TEST_0_5'
            type: 'port'
            content: 443

          - name: 'ANSIBLE_TEST_0_6'
            type: 'port'
            content: [80, 8443]
      register: opn4
      failed_when: >
        opn4.failed or
        opn4.changed
      when: not ansible_check_mode

    - name: Changing few
      ansibleguy.opnsense.alias:
        aliases:
          - name: 'ANSIBLE_TEST_0_4'
            type: 'network'
            content: ['192.168.12.0/24', '192.168.21.0/23']

          - name: 'ANSIBLE_TEST_0_6'
            type: 'port'
            content: [8080, 8443]
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Nothing changed
      ansibleguy.opnsense.alias:
        aliases:
          - name: 'ANSIBLE_TEST_0_1'
            type: 'host'
            content: '192.168.2.1'

          - name: 'ANSIBLE_TEST_0_2'
            type: 'host'
            content: ['192.168.2.1', '192.168.2.2']

          - name: 'ANSIBLE_TEST_0_3'
            type: 'network'
            content: '192.168.1.0/25'

          - name: 'ANSIBLE_TEST_0_4'
            type: 'network'
            content: ['192.168.12.0/24', '192.168.21.0/23']

          - name: 'ANSIBLE_TEST_0_5'
            type: 'port'
            content: 443

          - name: 'ANSIBLE_TEST_0_6'
            type: 'port'
            content: [8080, 8443]
      register: opn6
      failed_when: >
        opn6.failed or
        opn6.changed
      when: not ansible_check_mode

    - name: Disabling some
      ansibleguy.opnsense.alias:
        aliases:
          - name: 'ANSIBLE_TEST_0_1'
            type: 'host'
            content: '192.168.2.1'
            enabled: false

          - name: 'ANSIBLE_TEST_0_2'
            type: 'host'
            content: ['192.168.2.1', '192.168.2.2']
            enabled: false

        multi_control:
          enabled: false
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed
      when: not ansible_check_mode

    - name: Checking count
      ansibleguy.opnsense.list:
      register: opn8
      failed_when: >
        'data' not in opn8 or
        opn8.data | length != 6
      when: not ansible_check_mode

    - name: Checking disabled-state
      ansibleguy.opnsense.alias:
        aliases:
          - name: 'ANSIBLE_TEST_0_1'
            type: 'host'
            content: '192.168.2.1'
            enabled: false

          - name: 'ANSIBLE_TEST_0_2'
            type: 'host'
            content: ['192.168.2.1', '192.168.2.2']
            enabled: false

          - name: 'ANSIBLE_TEST_0_3'
            type: 'network'
            content: '192.168.1.0/25'

          - name: 'ANSIBLE_TEST_0_4'
            type: 'network'
            content: ['192.168.12.0/24', '192.168.21.0/23']

          - name: 'ANSIBLE_TEST_0_5'
            type: 'port'
            content: 443

          - name: 'ANSIBLE_TEST_0_6'
            type: 'port'
            content: [8080, 8443]
      register: opn9
      failed_when: >
        opn9.failed or
        opn9.changed
      when: not ansible_check_mode

    - name: Removing some
      ansibleguy.opnsense.alias:
        aliases:
          - name: 'ANSIBLE_TEST_0_1'
          - name: 'ANSIBLE_TEST_0_2'
        multi_control:
          state: 'absent'
      register: opn10
      failed_when: >
        opn10.failed or
        not opn10.changed
      when: not ansible_check_mode

    - name: Checking count
      ansibleguy.opnsense.list:
      register: opn11
      failed_when: >
        'data' not in opn11 or
        opn11.data | length != 4
      when: not ansible_check_mode

    - name: Purging all
      ansibleguy.opnsense.alias:
        multi_control:
          purge_all: true
      register: opn12
      failed_when: >
        opn12.failed or
        not opn12.changed
      when: not ansible_check_mode

    - name: Checking count
      ansibleguy.opnsense.list:
      register: opn13
      failed_when: >
        'data' not in opn13 or
        opn13.data | length != 0
      when: not ansible_check_mode
