---

- name: Testing IPSec PSK
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'ipsec_psk'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Cleanup
      oxlorg.opnsense.ipsec_psk:
        identity: "{{ item }}"
        state: 'absent'
      loop:
        - 'ANSIBLE@TEST1'
        - 'ANSIBLE@TEST2'
        - 'ANSIBLE@TEST2X'
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        'data' not in opn_pre1 or
        opn_pre1.data | length != 0

    - name: Removing - does not exist
      oxlorg.opnsense.ipsec_psk:
        identity: 'ANSIBLE@TEST1'
        state: 'absent'
      register: opn_pre2
      failed_when: >
        opn_pre2.failed or
        opn_pre2.changed

    - name: Adding 1 - failing because of missing psk
      oxlorg.opnsense.ipsec_psk:
        identity: 'ANSIBLE@TEST1'
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Adding 1 - failing because of invalid identity (server-side)
      oxlorg.opnsense.ipsec_psk:
        identity: 'ANSIBLE_TEST_1_1'
      register: opn_fail2
      failed_when: not opn_fail2.failed
      when: not ansible_check_mode

    - name: Adding 1
      oxlorg.opnsense.ipsec_psk:
        identity: 'ANSIBLE@TEST1'
        psk: 'my-super-secret'
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Adding 2
      oxlorg.opnsense.ipsec_psk:
        identity: 'ANSIBLE@TEST2'
        identity_remote: 'ANSIBLE@TEST2B'
        psk: 'LSfmuw3oiksfhnf3uhfwqhfwjuhnakfuwgfjsnhfnh'
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed

    - name: Adding 2 - nothing changed
      oxlorg.opnsense.ipsec_psk:
        identity: 'ANSIBLE@TEST2'
        identity_remote: 'ANSIBLE@TEST2B'
        psk: 'LSfmuw3oiksfhnf3uhfwqhfwjuhnakfuwgfjsnhfnh'
      register: opn6
      failed_when: >
        opn6.failed or
        opn6.changed
      when: not ansible_check_mode

    - name: Change - identity remote
      oxlorg.opnsense.ipsec_psk:
        identity: 'ANSIBLE@TEST2X'
        identity_remote: 'ANSIBLE@TEST2B'
        psk: 'LSfmuw3oiksfhnf3uhfwqhfwjuhnakfuwgfjsnhfnh_ooo'
        match_fields: 'identity_remote'
      register: opn9
      failed_when: >
        opn9.failed or
        not opn9.changed
      when: not ansible_check_mode

    - name: Change - identity remote - nothing changed
      oxlorg.opnsense.ipsec_psk:
        identity: 'ANSIBLE@TEST2X'
        identity_remote: 'ANSIBLE@TEST2B'
        psk: 'LSfmuw3oiksfhnf3uhfwqhfwjuhnakfuwgfjsnhfnh_ooo'
        match_fields: 'identity_remote'
      register: opn10
      failed_when: >
        opn10.failed or
        opn10.changed
      when: not ansible_check_mode

    - name: Change back - identity remote
      oxlorg.opnsense.ipsec_psk:
        identity: 'ANSIBLE@TEST2'
        identity_remote: 'ANSIBLE@TEST2B'
        psk: 'LSfmuw3oiksfhnf3uhfwqhfwjuhnakfuwgfjsnhfnh'
        match_fields: 'identity_remote'
      register: opn11
      failed_when: >
        opn11.failed or
        not opn11.changed
      when: not ansible_check_mode

    - name: Removing 2
      oxlorg.opnsense.ipsec_psk:
        identity: 'ANSIBLE@TEST2'
        state: 'absent'
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn8
      failed_when: >
        'data' not in opn8 or
        opn8.data | length != 1
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.ipsec_psk:
        identity: "{{ item }}"
        state: 'absent'
      loop:
        - 'ANSIBLE@TEST1'
        - 'ANSIBLE@TEST2'
        - 'ANSIBLE@TEST2X'
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn_clean1
      failed_when: >
        'data' not in opn_clean1 or
        opn_clean1.data | length != 0
      when: not ansible_check_mode
