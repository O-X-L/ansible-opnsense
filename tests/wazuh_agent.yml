---

- name: 'Testing Wazuh Agent'
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'wazuh_agent'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        opn_pre1.failed or
        'data' not in opn_pre1

    - name: Configuring - failing because of invalid server address
      oxlorg.opnsense.wazuh_agent:
        server_address: 'invalid..server'
        reload: false
      register: opn_fail1
      failed_when: not opn_fail1.failed
      when: not ansible_check_mode

    - name: Configuring - failing because of invalid port
      oxlorg.opnsense.wazuh_agent:
        server_address: '192.168.1.100'
        port: 99999
        reload: false
      register: opn_fail2
      failed_when: not opn_fail2.failed
      when: not ansible_check_mode

    - name: Configuring - failing because of invalid debug level
      oxlorg.opnsense.wazuh_agent:
        server_address: '192.168.1.100'
        debug_level: 5
        reload: false
      register: opn_fail3
      failed_when: not opn_fail3.failed
      when: not ansible_check_mode

    - name: Configuring
      oxlorg.opnsense.wazuh_agent:
        server_address: '192.168.1.100'
        agent_name: 'test-agent'
        protocol: 'tcp'
        port: 1514
        debug_level: 1
        reload: false
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Configuring - nothing changed
      oxlorg.opnsense.wazuh_agent:
        server_address: '192.168.1.100'
        agent_name: 'test-agent'
        protocol: 'tcp'
        port: 1514
        debug_level: 1
        reload: false
      register: opn2
      failed_when: >
        opn2.failed or
        opn2.changed
      when: not ansible_check_mode

    - name: Configuring - changing server
      oxlorg.opnsense.wazuh_agent:
        server_address: '10.0.0.100'
        agent_name: 'test-agent-2'
        protocol: 'udp'
        port: 1515
        debug_level: 0
        enabled: false
        reload: false
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed
      when: not ansible_check_mode

    - name: Configuring - with authentication
      oxlorg.opnsense.wazuh_agent:
        server_address: '10.0.0.100'
        agent_name: 'test-agent-auth'
        protocol: 'tcp'
        auth_password: 'test123'
        auth_port: 1515
        remote_commands: true
        syslog_programs:
          - 'filterlog'
          - 'suricata'
        suricata_eve_log: true
        rootcheck_enabled: false
        syscollector_enabled: true
        syscheck_enabled: false
        active_response_enabled: true
        active_response_remote_commands: false
        # active_response_fw_alias_ignore:
        #   - 'trusted_hosts'
        reload: false
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.wazuh_agent:
        server_address: '127.0.0.1'
        enabled: false
        reload: false
