---

- name: Testing Access User
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/ansibleguy.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    ansibleguy.opnsense.list:
      target: 'user'

  tasks:
    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_pre1
      failed_when: >
        'data' not in opn_pre1 or
        opn_pre1.data | selectattr('scope', 'eq', 'user') | length != 0

    - name: Removing - does not exist
      ansibleguy.opnsense.user:
        name: 'ANSIBLE_TEST_1_1'
        state: 'absent'
      register: opn_pre2
      failed_when: >
        opn_pre2.failed or
        opn_pre2.changed

    - name: Removing 1 - failing because of system user
      ansibleguy.opnsense.user:
        name: 'root'
        state: 'absent'
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Adding 1
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_1_1
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing 1
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_1_1
        description: ANSIBLE_TEST_1_1
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Setting Password 1
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_1_1
        description: ANSIBLE_TEST_1_1
        scrambled_password: true
        update_password: on_create
      register: opn2
      failed_when: >
        opn2.failed or
        opn2.changed
      when: not ansible_check_mode

    - name: Setting Password 1 - nothing changed
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_1_1
        description: ANSIBLE_TEST_1_1
        password: foo
        update_password: on_create
      register: opn2
      failed_when: >
        opn2.failed or
        opn2.changed
      when: not ansible_check_mode

    - name: Disabling 1
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_1_1
        description: ANSIBLE_TEST_1_1
        enabled: false
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed
      when: not ansible_check_mode

    - name: Disabling 1 - nothing changed
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_1_1
        description: ANSIBLE_TEST_1_1
        enabled: false
      register: opn4
      failed_when: >
        opn4.failed or
        opn4.changed
      when: not ansible_check_mode

    - name: Enabling 1
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_1_1
        description: ANSIBLE_TEST_1_1
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Adding 2
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_1_2
        description: ANSIBLE_TEST_1_2
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed

    - name: Adding 2 - nothing changed
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_1_2
        description: ANSIBLE_TEST_1_2
      register: opn7
      failed_when: >
        opn7.failed or
        opn7.changed
      when: not ansible_check_mode

    - name: Changing 2 - grant privileges
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_1_2
        description: ANSIBLE_TEST_1_2
        privilege:
          - user-config-readonly
      register: opn8
      failed_when: >
        opn8.failed or
        not opn8.changed
      when: not ansible_check_mode

    - name: Changing 2 - grant privileges - nothing changed
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_1_2
        description: ANSIBLE_TEST_1_2
        privilege:
          - user-config-readonly
      register: opn9
      failed_when: >
        opn9.failed or
        opn9.changed
      when: not ansible_check_mode

    - name: Changing 2 - nothing changed
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_1_2
        description: ANSIBLE_TEST_1_2
      register: opn10
      failed_when: >
        opn10.failed or
        opn10.changed
      when: not ansible_check_mode

    - name: Changing 2 - revoking privileges
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_1_2
        description: ANSIBLE_TEST_1_2
        privilege: []
      register: opn11
      failed_when: >
        opn11.failed or
        not opn11.changed
      when: not ansible_check_mode

    - name: Changing 2 - revoking privileges - nothing changed
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_1_2
        description: ANSIBLE_TEST_1_2
        privilege: []
      register: opn12
      failed_when: >
        opn12.failed or
        opn12.changed
      when: not ansible_check_mode

    - name: Removing 2
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_1_2
        state: 'absent'
      register: opn13
      failed_when: >
        opn13.failed or
        not opn13.changed
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn14
      failed_when: >
        'data' not in opn14 or
        opn14.data | selectattr('scope', 'eq', 'user') | length != 1
      when: not ansible_check_mode

    - name: Cleanup
      ansibleguy.opnsense.user:
        name: '{{ item }}'
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_1_1'
        - 'ANSIBLE_TEST_1_2'
      when: not ansible_check_mode

    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_clean1
      failed_when: >
        'data' not in opn_clean1 or
        opn_clean1.data | selectattr('scope', 'eq', 'user')| length != 0
      when: not ansible_check_mode

- name: Testing Access User Group Membership
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/ansibleguy.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    ansibleguy.opnsense.list:
      target: 'user'

  tasks:
    - name: Adding Dummy Group
      ansibleguy.opnsense.group:
        name: '{{ item }}'
      loop:
        - ANSIBLE_TEST_2_1
        - ANSIBLE_TEST_2_2

    - name: Adding 1
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_2_1
        membership: ANSIBLE_TEST_2_1
      register: opn15
      failed_when: >
        opn15.failed or
        not opn15.changed

    - name: Changing 1
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_2_1
        membership:
          - ANSIBLE_TEST_2_1
          - ANSIBLE_TEST_2_2
      register: opn16
      failed_when: >
        opn16.failed or
        not opn16.changed

    - name: Changing 1 - nothing changed
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_2_1
        membership:
          - ANSIBLE_TEST_2_1
          - ANSIBLE_TEST_2_2
      register: opn17
      failed_when: >
        opn17.failed or
        opn17.changed
      when: not ansible_check_mode

    - name: Changing 1
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_2_1
        membership: []
      register: opn18
      failed_when: >
        opn18.failed or
        not opn18.changed
      when: not ansible_check_mode

    - name: Changing 1 - nothing changed
      ansibleguy.opnsense.user:
        name: ANSIBLE_TEST_2_1
        membership: []
      register: opn19
      failed_when: >
        opn19.failed or
        opn19.changed
      when: not ansible_check_mode

    - name: Cleanup
      ansibleguy.opnsense.user:
        name: '{{ item }}'
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_2_1'
      when: not ansible_check_mode

    - name: Cleanup Dummy Group
      ansibleguy.opnsense.group:
        name: '{{ item }}'
        state: 'absent'
      loop:
        - ANSIBLE_TEST_2_1
        - ANSIBLE_TEST_2_2
      diff: false
