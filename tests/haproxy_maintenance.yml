---

- name: Testing HAProxy maintenance settings
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/ansibleguy.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    ansibleguy.opnsense.list:
      target: 'haproxy_maintenance'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      ansibleguy.opnsense.list:
      register: opn_pre1
      failed_when: >
        opn_pre1.failed or
        'data' not in opn_pre1

    - name: Configuring maintenance jobs
      ansibleguy.opnsense.haproxy_maintenance:
        sync_certs: true
        reload_service: false
        restart_service: false
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing maintenance settings
      ansibleguy.opnsense.haproxy_maintenance:
        sync_certs: false
        reload_service: true
        restart_service: false
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Enabling all maintenance jobs
      ansibleguy.opnsense.haproxy_maintenance:
        sync_certs: true
        reload_service: true
        restart_service: true
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed
      when: not ansible_check_mode

    - name: Nothing changed
      ansibleguy.opnsense.haproxy_maintenance:
        sync_certs: true
        reload_service: true
        restart_service: true
      register: opn4
      failed_when: >
        opn4.failed or
        opn4.changed
      when: not ansible_check_mode

    - name: Disabling all maintenance jobs
      ansibleguy.opnsense.haproxy_maintenance:
        sync_certs: false
        reload_service: false
        restart_service: false
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Cleanup
      ansibleguy.opnsense.haproxy_maintenance:
        sync_certs: false
        reload_service: false
        restart_service: false
      when: not ansible_check_mode
