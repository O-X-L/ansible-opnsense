---

- name: Testing ACME Certificate
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_CREDS_FILE') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'acme_certificate'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        'data' not in opn_pre1 or
        opn_pre1.data | length != 0

    - name: Removing - does not exist
      oxlorg.opnsense.acme_certificate:
        description: 'ANSIBLE_TEST_1_1'
        state: 'absent'
      register: opn_pre2
      failed_when: >
        opn_pre2.failed or
        opn_pre2.changed

    - name: Adding dummy account
      oxlorg.opnsense.acme_account:
        name: 'ANSIBLE_TEST_DUMMY_1_1'
        ca: letsencrypt_test

    - name: Adding dummy validation
      oxlorg.opnsense.acme_validation:
        name: 'ANSIBLE_TEST_DUMMY_1_1'
        method: http01

    - name: Adding dummy action
      oxlorg.opnsense.acme_action:
        name: 'ANSIBLE_TEST_DUMMY_1_1'
        type: configd_restart_gui

    - name: Adding 1 - failing because of missing name
      oxlorg.opnsense.acme_certificate:
        description: 'ANSIBLE_TEST_1_1'
        account: 'ANSIBLE_TEST_DUMMY_1_1'
        validation: 'ANSIBLE_TEST_DUMMY_1_1'
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Adding 1 - failing because of missing account
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        description: 'ANSIBLE_TEST_1_1'
        validation: 'ANSIBLE_TEST_DUMMY_1_1'
      register: opn_fail2
      failed_when: not opn_fail2.failed

    - name: Adding 1 - failing because of unknown account
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        description: 'ANSIBLE_TEST_1_1'
        account: 'DOES_NOT_EXIST'
        validation: 'ANSIBLE_TEST_DUMMY_1_1'
      register: opn_fail3
      failed_when: not opn_fail3.failed

    - name: Adding 1 - failing because of missing validation
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        description: 'ANSIBLE_TEST_1_1'
        account: 'ANSIBLE_TEST_DUMMY_1_1'
      register: opn_fail4
      failed_when: not opn_fail4.failed

    - name: Adding 1 - failing because of unknown validation
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        description: 'ANSIBLE_TEST_1_1'
        account: 'ANSIBLE_TEST_DUMMY_1_1'
        validation: 'DOES_NOT_EXIST'
      register: opn_fail5
      failed_when: not opn_fail5.failed

    - name: Adding 1 - failing because of unknown restart_actions
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        description: 'ANSIBLE_TEST_1_1'
        account: 'ANSIBLE_TEST_DUMMY_1_1'
        validation: 'ANSIBLE_TEST_DUMMY_1_1'
        restart_actions:
          - 'DOES_NOT_EXIST'
      register: opn_fail6
      failed_when: not opn_fail6.failed

    - name: Adding 1
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        description: 'ANSIBLE_TEST_1_1'
        account: 'ANSIBLE_TEST_DUMMY_1_1'
        validation: 'ANSIBLE_TEST_DUMMY_1_1'
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing 1
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        alt_names:
          - 'sub.example.com'
        description: 'ANSIBLE_TEST_1_1'
        account: 'ANSIBLE_TEST_DUMMY_1_1'
        validation: 'ANSIBLE_TEST_DUMMY_1_1'
        restart_actions:
          - 'ANSIBLE_TEST_DUMMY_1_1'
        auto_renewal: false
        renew_interval: 42
        key_length: key_ec384
        ocsp: true
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Changing 1 - nothing changed
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        alt_names:
          - 'sub.example.com'
        description: 'ANSIBLE_TEST_1_1'
        account: 'ANSIBLE_TEST_DUMMY_1_1'
        validation: 'ANSIBLE_TEST_DUMMY_1_1'
        restart_actions:
          - 'ANSIBLE_TEST_DUMMY_1_1'
        auto_renewal: false
        renew_interval: 42
        key_length: key_ec384
        ocsp: true
      register: opn3
      failed_when: >
        opn3.failed or
        opn3.changed

    - name: Disabling 1
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        alt_names:
          - 'sub.example.com'
        description: 'ANSIBLE_TEST_1_1'
        account: 'ANSIBLE_TEST_DUMMY_1_1'
        validation: 'ANSIBLE_TEST_DUMMY_1_1'
        restart_actions:
          - 'ANSIBLE_TEST_DUMMY_1_1'
        auto_renewal: false
        renew_interval: 42
        key_length: key_ec384
        ocsp: true
        enabled: false
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed
      when: not ansible_check_mode

    - name: Disabling 1 - nothing changed
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        alt_names:
          - 'sub.example.com'
        description: 'ANSIBLE_TEST_1_1'
        account: 'ANSIBLE_TEST_DUMMY_1_1'
        validation: 'ANSIBLE_TEST_DUMMY_1_1'
        restart_actions:
          - 'ANSIBLE_TEST_DUMMY_1_1'
        auto_renewal: false
        renew_interval: 42
        key_length: key_ec384
        ocsp: true
        enabled: false
      register: opn5
      failed_when: >
        opn5.failed or
        opn5.changed
      when: not ansible_check_mode

    - name: Enabling 1
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        alt_names:
          - 'sub.example.com'
        description: 'ANSIBLE_TEST_1_1'
        account: 'ANSIBLE_TEST_DUMMY_1_1'
        validation: 'ANSIBLE_TEST_DUMMY_1_1'
        restart_actions:
          - 'ANSIBLE_TEST_DUMMY_1_1'
        auto_renewal: false
        renew_interval: 42
        key_length: key_ec384
        ocsp: true
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed
      when: not ansible_check_mode

    - name: Adding 2
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        description: 'ANSIBLE_TEST_1_2'
        account: 'ANSIBLE_TEST_DUMMY_1_1'
        validation: 'ANSIBLE_TEST_DUMMY_1_1'
        aliasmode: domain
        domainalias: aliasDomainForValidationOnly.com
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed

    - name: Changing 2
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        description: 'ANSIBLE_TEST_1_2'
        account: 'ANSIBLE_TEST_DUMMY_1_1'
        validation: 'ANSIBLE_TEST_DUMMY_1_1'
        aliasmode: domain
        domainalias: aliasDomainForValidationOnly2.com
      register: opn8
      failed_when: >
        opn8.failed or
        not opn8.changed

    - name: Changing 2 - nothing changed
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        description: 'ANSIBLE_TEST_1_2'
        account: 'ANSIBLE_TEST_DUMMY_1_1'
        validation: 'ANSIBLE_TEST_DUMMY_1_1'
        aliasmode: domain
        domainalias: aliasDomainForValidationOnly2.com
      register: opn9
      failed_when: >
        opn9.failed or
        opn9.changed

    - name: Adding 3
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        description: 'ANSIBLE_TEST_1_3'
        account: 'ANSIBLE_TEST_DUMMY_1_1'
        validation: 'ANSIBLE_TEST_DUMMY_1_1'
        aliasmode: challenge
        challengealias: aliasDomainForValidationOnly.com
      register: opn10
      failed_when: >
        opn10.failed or
        not opn10.changed

    - name: Changing 3
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        description: 'ANSIBLE_TEST_1_3'
        account: 'ANSIBLE_TEST_DUMMY_1_1'
        validation: 'ANSIBLE_TEST_DUMMY_1_1'
        aliasmode: challenge
        challengealias: aliasDomainForValidationOnly2.com
      register: opn11
      failed_when: >
        opn11.failed or
        not opn11.changed

    - name: Changing 3 - nothing changed
      oxlorg.opnsense.acme_certificate:
        name: 'example.com'
        description: 'ANSIBLE_TEST_1_3'
        account: 'ANSIBLE_TEST_DUMMY_1_1'
        validation: 'ANSIBLE_TEST_DUMMY_1_1'
        aliasmode: challenge
        challengealias: aliasDomainForValidationOnly2.com
      register: opn12
      failed_when: >
        opn12.failed or
        opn12.changed

    - name: Listing
      oxlorg.opnsense.list:
      register: opn8
      failed_when: >
        'data' not in opn8 or
        opn8.data | length != 3
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.acme_certificate:
        description: '{{ item }}'
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_1_1'
        - 'ANSIBLE_TEST_1_2'
        - 'ANSIBLE_TEST_1_3'
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn_clean1
      failed_when: >
        'data' not in opn_clean1 or
        opn_clean1.data | length != 0
      when: not ansible_check_mode

    - name: Cleanup Dummy Account
      oxlorg.opnsense.acme_account:
        name: 'ANSIBLE_TEST_DUMMY_1_1'
        state: 'absent'
      diff: false

    - name: Cleanup Dummy Validation
      oxlorg.opnsense.acme_validation:
        name: 'ANSIBLE_TEST_DUMMY_1_1'
        state: 'absent'
      diff: false

    - name: Cleanup Dummy Action
      oxlorg.opnsense.acme_action:
        name: 'ANSIBLE_TEST_DUMMY_1_1'
        state: 'absent'
      diff: false
