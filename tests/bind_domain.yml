---

- name: Testing BIND Domains
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_CREDS_FILE') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'bind_domain'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        opn_pre1.failed or
        'data' not in opn_pre1 or
        opn_pre1.data | length > 0

    - name: Adding - failing because of invalid integer values
      oxlorg.opnsense.bind_domain:
        name: 'test1.oxlorg'
        ttl: "{{ item.ttl | default(omit) }}"
        refresh: "{{ item.refresh | default(omit) }}"
        retry: "{{ item.retry | default(omit) }}"
        expire: "{{ item.expire | default(omit) }}"
        negative: "{{ item.negative | default(omit) }}"
      register: opn_fail1
      failed_when: not opn_fail1.failed
      loop:
        - {'ttl': 40}
        - {'ttl': 90000}
        - {'refresh': 90000}
        - {'retry': 90000}
        - {'expire': 10050000}
        - {'negative': 90000}

    - name: Adding - failing because invalid ips were provided
      oxlorg.opnsense.bind_domain:
        name: 'test1.oxlorg'
        allow_notify: "{{ item.a | default(omit) }}"
        primary: "{{ item.m | default(omit) }}"
      register: opn_fail2
      failed_when: not opn_fail2.failed
      loop:
        - {'a': ['192.168.0.2000']}
        - {'a': ['192.168.0.0/24']}
        - {'m': ['NOT-VALID']}

    - name: Adding 1
      oxlorg.opnsense.bind_domain:
        name: 'test1.oxlorg'
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing 1
      oxlorg.opnsense.bind_domain:
        name: 'test1.oxlorg'
        server: 'dns.oxlorg.net'
        admin_mail: 'primary@oxlorg.net'
        ttl: 14400
        retry: 1800
      register: opn9
      failed_when: >
        opn9.failed or
        not opn9.changed

    - name: Disabling 1
      oxlorg.opnsense.bind_domain:
        name: 'test1.oxlorg'
        server: 'dns.oxlorg.net'
        admin_mail: 'primary@oxlorg.net'
        ttl: 14400
        retry: 1800
        enabled: false
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed
      when: not ansible_check_mode

    - name: Disabling 1 - nothing changed
      oxlorg.opnsense.bind_domain:
        name: 'test1.oxlorg'
        server: 'dns.oxlorg.net'
        admin_mail: 'primary@oxlorg.net'
        ttl: 14400
        retry: 1800
        enabled: false
      register: opn3
      failed_when: >
        opn3.failed or
        opn3.changed
      when: not ansible_check_mode

    - name: Enabling 1
      oxlorg.opnsense.bind_domain:
        name: 'test1.oxlorg'
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed
      when: not ansible_check_mode

    - name: Adding 2
      oxlorg.opnsense.bind_domain:
        name: 'test2.oxlorg'
        mode: 'secondary'
        primary: ['192.168.0.1']
        negative: 1800
        expire: 1000000
        transfer_key_algo: 'hmac-sha512'
        transfer_key_name: 'test2'
        transfer_key: "{{ 'randomsecret' | b64encode }}"
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Adding 2 - Nothing changed
      oxlorg.opnsense.bind_domain:
        name: 'test2.oxlorg'
        mode: 'secondary'
        primary: ['192.168.0.1']
        negative: 1800
        expire: 1000000
        transfer_key_algo: 'hmac-sha512'
        transfer_key_name: 'test2'
        transfer_key: "{{ 'randomsecret' | b64encode }}"
      register: opn6
      failed_when: >
        opn6.failed or
        opn6.changed
      when: not ansible_check_mode

    - name: Removing 2
      oxlorg.opnsense.bind_domain:
        name: 'test2.oxlorg'
        state: 'absent'
      register: opn7
      failed_when: >
        opn7.failed or
        not opn7.changed
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn8
      failed_when: >
        'data' not in opn8 or
        opn8.data | length != 1
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.bind_domain:
        name: "{{ item }}"
        state: 'absent'
      loop:
        - 'test1.oxlorg'
        - 'test2.oxlorg'
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn_clean1
      failed_when: >
        'data' not in opn_clean1 or
        opn_clean1.data | length != 0
      when: not ansible_check_mode

- name: Testing BIND general - acl linking
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_CREDS_FILE') }}"
      ssl_verify: false

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Adding dummy acl's
      oxlorg.opnsense.bind_acl:
        name: "{{ item.name }}"
        networks: "{{ item.net }}"
      loop:
        - {'name': 'ANSIBLE_TEST_3_1', 'net': '192.168.0.0/25'}
        - {'name': 'ANSIBLE_TEST_3_2', 'net': '192.168.0.128/25'}
      when: not ansible_check_mode

    - name: Adding - setting ACLs
      oxlorg.opnsense.bind_domain:
        name: 'test3.oxlorg'
        query_acl: 'ANSIBLE_TEST_3_1'
        transfer_acl: 'ANSIBLE_TEST_3_2'
      register: opn10
      failed_when: >
        opn10.failed or
        not opn10.changed
      when: not ansible_check_mode

    - name: Configuring - nothing changed
      oxlorg.opnsense.bind_domain:
        name: 'test3.oxlorg'
        query_acl: 'ANSIBLE_TEST_3_1'
        transfer_acl: 'ANSIBLE_TEST_3_2'
      register: opn11
      failed_when: >
        opn11.failed or
        opn11.changed
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.bind_domain:
        name: 'test3.oxlorg'
        state: 'absent'
      when: not ansible_check_mode

    - name: Cleanup ACLs
      oxlorg.opnsense.bind_acl:
        name: "{{ item }}"
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_3_1'
        - 'ANSIBLE_TEST_3_2'
      when: not ansible_check_mode
