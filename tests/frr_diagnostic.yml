---

- name: Testing FRR info querying
  hosts: localhost
  gather_facts: no
  module_defaults:
    oxlorg.opnsense.frr_diagnostic:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Showing BGP neighbors
      oxlorg.opnsense.frr_diagnostic:
        target: 'bgpneighbors'
      register: opn1
      failed_when: >
        opn1.failed or
        'data' not in opn1

    - name: Showing config
      oxlorg.opnsense.frr_diagnostic:
        target: 'generalrunningconfig'
      register: opn2
      failed_when: >
        opn2.failed or
        'data' not in opn2
