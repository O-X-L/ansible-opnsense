---

- name: Testing FRR OSPFV3 Redistribution
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'frr_ospf3_redistribution'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        'data' not in opn_pre1 or
        opn_pre1.data | length != 0

    - name: Removing - does not exist
      oxlorg.opnsense.frr_ospf3_redistribution:
        description: 'ANSIBLE_TEST_1_1'
        state: 'absent'
      register: opn_pre2
      failed_when: >
        opn_pre2.failed or
        opn_pre2.changed

    - name: Adding 1 - failing because of invalid redistribute
      oxlorg.opnsense.frr_ospf3_redistribution:
        description: 'ANSIBLE_TEST_1_1'
        redistribute: ansible
      register: opn_fail1
      failed_when: not opn_fail1.failed


    - name: Adding 1 - failing because of non-existent route-map
      oxlorg.opnsense.frr_ospf3_redistribution:
        description: 'ANSIBLE_TEST_1_1'
        redistribute: bgp
        route_map: 'DOES-NOT-EXIST'
      register: opn_fail2
      failed_when: not opn_fail2.failed

    - name: Adding 1
      oxlorg.opnsense.frr_ospf3_redistribution:
        description: 'ANSIBLE_TEST_1_1'
        redistribute: bgp
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing 1
      oxlorg.opnsense.frr_ospf3_redistribution:
        description: 'ANSIBLE_TEST_1_1'
        redistribute: connected
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed

    - name: Disabling 1
      oxlorg.opnsense.frr_ospf3_redistribution:
        description: 'ANSIBLE_TEST_1_1'
        redistribute: connected
        enabled: false
      register: opn3
      failed_when: >
        opn3.failed or
        not opn3.changed
      when: not ansible_check_mode

    - name: Disabling 1 - nothing changed
      oxlorg.opnsense.frr_ospf3_redistribution:
        description: 'ANSIBLE_TEST_1_1'
        redistribute: connected
        enabled: false
      register: opn4
      failed_when: >
        opn4.failed or
        opn4.changed
      when: not ansible_check_mode

    - name: Enabling 1
      oxlorg.opnsense.frr_ospf3_redistribution:
        description: 'ANSIBLE_TEST_1_1'
        redistribute: connected
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed
      when: not ansible_check_mode

    - name: Adding 2
      oxlorg.opnsense.frr_ospf3_redistribution:
        description: 'ANSIBLE_TEST_1_2'
        redistribute: bgp
      register: opn6
      failed_when: >
        opn6.failed or
        not opn6.changed

    - name: Adding 2 - nothing changed
      oxlorg.opnsense.frr_ospf3_redistribution:
        description: 'ANSIBLE_TEST_1_2'
        redistribute: bgp
      register: opn7
      failed_when: >
        opn7.failed or
        opn7.changed
      when: not ansible_check_mode

    - name: Removing 2
      oxlorg.opnsense.frr_ospf3_redistribution:
        description: 'ANSIBLE_TEST_1_2'
        state: 'absent'
      register: opn8
      failed_when: >
        opn8.failed or
        not opn8.changed
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn9
      failed_when: >
        'data' not in opn9 or
        opn9.data | length != 1
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.frr_ospf3_redistribution:
        description: "{{ item }}"
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_1_1'
        - 'ANSIBLE_TEST_1_2'
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn_clean1
      failed_when: >
        'data' not in opn_clean1 or
        opn_clean1.data | length != 0
      when: not ansible_check_mode

- name: Testing FRR OSPFV3 Redistribution - linking
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'frr_ospf3_redistribution'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre2
      failed_when: >
        'data' not in opn_pre2 or
        opn_pre2.data | length != 0
      when: not ansible_check_mode

    - name: Adding dummy route-map
      oxlorg.opnsense.frr_ospf3_route_map:
        name: 'ANSIBLE_TEST_3_1'
        id: 50
        action: 'permit'
      when: not ansible_check_mode

    - name: Adding redistribution linked to route-map
      oxlorg.opnsense.frr_ospf3_redistribution:
        description: 'ANSIBLE_TEST_2_1'
        redistribute: bgp
        route_map: 'ANSIBLE_TEST_3_1'
      register: opn10
      failed_when: >
        opn10.failed or
        not opn10.changed
      when: not ansible_check_mode

    - name: Cleanup redistributions
      oxlorg.opnsense.frr_ospf3_redistribution:
        description: "{{ item }}"
        state: 'absent'
      loop:
        - 'ANSIBLE_TEST_2_1'
        - 'ANSIBLE_TEST_2_2'
      when: not ansible_check_mode

    - name: Cleanup route-map
      oxlorg.opnsense.frr_ospf3_route_map:
        name: 'ANSIBLE_TEST_3_1'
        state: 'absent'
      when: not ansible_check_mode

    - name: Listing
      oxlorg.opnsense.list:
      register: opn_clean2
      failed_when: >
        'data' not in opn_clean2 or
        opn_clean2.data | length != 0
      when: not ansible_check_mode
