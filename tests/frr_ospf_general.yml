---

- name: Testing FRR-OSPF general settings
  hosts: localhost
  gather_facts: no
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ lookup('ansible.builtin.env', 'TEST_FIREWALL') }}"
      api_credential_file: "{{ lookup('ansible.builtin.env', 'TEST_API_KEY') }}"
      ssl_verify: false

    oxlorg.opnsense.list:
      target: 'frr_ospf_general'

  environment:
    HTTPS_PROXY: "{{ lookup('ansible.builtin.env', 'TEST_PROXY') | default('') }}"

  tasks:
    - name: Listing
      oxlorg.opnsense.list:
      register: opn_pre1
      failed_when: >
        opn_pre1.failed or
        'data' not in opn_pre1

    - name: Configuring - failing because of invalid cost
      oxlorg.opnsense.frr_ospf_general:
        cost: 50000000
      register: opn_fail1
      failed_when: not opn_fail1.failed

    - name: Configuring - failing because of invalid originate_metric
      oxlorg.opnsense.frr_ospf_general:
        originate_metric: 17000000
      register: opn_fail2
      failed_when: not opn_fail2.failed

    - name: Configuring
      oxlorg.opnsense.frr_ospf_general:
        id: '10.0.0.1'
        cost: 250
        passive_ints: ['lan']
        originate: true
        enabled: true
      register: opn1
      failed_when: >
        opn1.failed or
        not opn1.changed

    - name: Changing
      oxlorg.opnsense.frr_ospf_general:
        id: '10.0.1.1'
        cost: 300
        passive_ints: ['lan']
        originate: true
        originate_metric: 1000
        enabled: true
      register: opn5
      failed_when: >
        opn5.failed or
        not opn5.changed

    - name: Disabling 1
      oxlorg.opnsense.frr_ospf_general:
        id: '10.0.1.1'
        cost: 300
        passive_ints: ['lan']
        originate: true
        originate_metric: 1000
        enabled: false
      register: opn2
      failed_when: >
        opn2.failed or
        not opn2.changed
      when: not ansible_check_mode

    - name: Disabling 1 - nothing changed
      oxlorg.opnsense.frr_ospf_general:
        id: '10.0.1.1'
        cost: 300
        passive_ints: ['lan']
        originate: true
        originate_metric: 1000
        enabled: false
      register: opn3
      failed_when: >
        opn3.failed or
        opn3.changed
      when: not ansible_check_mode

    - name: Enabling 1
      oxlorg.opnsense.frr_ospf_general:
        id: '10.0.1.1'
        cost: 300
        passive_ints: ['lan']
        originate: true
        originate_metric: 1000
      register: opn4
      failed_when: >
        opn4.failed or
        not opn4.changed
      when: not ansible_check_mode

    - name: Cleanup
      oxlorg.opnsense.frr_ospf_general:
        enabled: false
      when: not ansible_check_mode
