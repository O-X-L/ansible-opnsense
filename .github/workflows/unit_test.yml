---

name: Unit Tests

on:
  push:
    branches: [latest]
    paths:
      - '**.py'
      - '.github/workflows/unit_test.yml'
      - 'pytest.ini'
  pull_request:
    branches: [latest]
    paths:
      - '**.py'
      - '.github/workflows/unit_test.yml'
      - 'pytest.ini'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}

      - name: Install python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements_unittest.txt > /dev/null
        shell: bash

      - name: Preparing collection for Unit-Tests
        run: |
          mkdir -p /tmp/ansible_pytest/collections/ansible_collections/ansibleguy
          ln -s ${{ github.workspace }} /tmp/ansible_pytest/collections/ansible_collections/ansibleguy/opnsense
        shell: bash

      - name: Running Tests
        run: |
          python3 -m pytest --version
          python3 -m pytest --cov
        shell: bash
        env:
          PYTHONUNBUFFERED: 1
