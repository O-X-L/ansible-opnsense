---

name: Functional-Tests Execution for PRs

on:
  pull_request:
    branches: [latest]
    paths:
      - 'plugins/**.py'
      - 'tests/**.yml'
      - '.github/workflows/functional_test_pr.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}

      - name: Test Connection
        run: |
          sudo apt install curl >/dev/null
          https_proxy=${{ secrets.CI_TEST_PROXY }} curl --fail-with-body https://${{ vars.CI_TEST_FIREWALL_1 }} --insecure > /tmp/test.html

          if grep -q 'DNS Rebind attack' < /tmp/test.html
          then
            echo 'ERROR: Firewall Hostname ${{ vars.CI_TEST_FIREWALL_1 }} not configured!'
            exit 1
          fi
        shell: bash

      - name: Get changes
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files: |
            plugins/**.py

      - name: Checking which module to test
        run: |
          echo ${{ steps.changed-files.outputs.all_changed_files }} > /tmp/changes.txt
          bash scripts/get_changed_modules.sh /tmp/changes.txt /tmp/changed_modules.txt
        shell: bash
